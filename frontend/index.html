<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Oscillator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;user-select:none}
canvas{display:block}
#audio-prompt{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);color:rgba(255,200,120,0.9);
  padding:24px 48px;border-radius:50px;font-size:16px;letter-spacing:3px;
  cursor:pointer;z-index:30;border:1px solid rgba(255,160,60,0.3);
  transition:opacity 1s ease;text-transform:uppercase;
}
#audio-prompt.hidden{opacity:0;pointer-events:none}
#perf-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:15;
  background:rgba(0,0,0,0.8);border-top:1px solid rgba(255,160,60,0.15);
  display:flex;flex-direction:column;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
#transport{display:flex;align-items:center;gap:10px;padding:5px 12px;border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap}
#sections{display:flex;gap:0;padding:0;flex-wrap:wrap}
.section{flex:1;min-width:140px;display:flex;flex-direction:column;gap:4px;padding:6px 10px;border-right:1px solid rgba(255,255,255,0.05)}
.section:last-child{border-right:none}
.sec-title{color:rgba(255,180,80,0.6);font-size:8px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.ctrl-row{display:flex;gap:5px;align-items:center;justify-content:center;flex-wrap:wrap}
.sl{-webkit-appearance:none;appearance:none;width:70px;height:3px;border-radius:3px;background:rgba(255,255,255,0.08);outline:none;cursor:pointer}
.sl::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:radial-gradient(circle,rgba(255,180,80,0.9),rgba(180,80,20,0.6));border:1px solid rgba(255,200,120,0.3);cursor:pointer}
.lbl{color:rgba(200,170,130,0.55);font-size:8px;min-width:28px;text-align:right;letter-spacing:1px}
.btn{background:rgba(255,255,255,0.05);color:rgba(200,170,130,0.7);border:1px solid rgba(255,160,60,0.15);border-radius:12px;padding:3px 8px;font-size:9px;cursor:pointer;font-family:inherit;transition:all 0.2s;letter-spacing:1px}
.btn:hover{background:rgba(255,160,60,0.12)}
.btn.on{background:rgba(255,120,30,0.25);border-color:rgba(255,160,60,0.5);color:rgba(255,220,160,0.95)}
.btn.rec{background:rgba(255,40,40,0.2);border-color:rgba(255,60,60,0.4);color:rgba(255,120,120,0.8)}
.btn.rec.on{background:rgba(255,40,40,0.5);border-color:rgba(255,80,80,0.7);color:#fff;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:0.5}}
.btn.grn{background:rgba(40,200,80,0.15);border-color:rgba(60,200,100,0.3);color:rgba(120,255,150,0.8)}
.btn.grn.on{background:rgba(40,200,80,0.35);color:rgba(200,255,220,0.95)}
#bpm-val{color:rgba(255,180,80,0.7);font-size:10px;min-width:40px;text-align:center;font-weight:bold}
#keyboard{display:flex;height:44px;position:relative;justify-content:center;padding:1px 0}
.key{position:relative;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-size:7px;transition:background 0.08s}
.key.white{width:26px;height:42px;border-radius:0 0 3px 3px;background:linear-gradient(180deg,rgba(230,220,210,0.92),rgba(210,200,190,0.88));border:1px solid rgba(100,80,60,0.25);color:rgba(80,60,40,0.5);margin:0 0.5px;z-index:1}
.key.white:hover,.key.white.active{background:linear-gradient(180deg,rgba(255,220,140,0.95),rgba(255,200,110,0.92))}
.key.black{width:18px;height:26px;border-radius:0 0 2px 2px;background:linear-gradient(180deg,rgba(50,40,30,0.95),rgba(25,18,12,0.92));border:1px solid rgba(80,60,40,0.4);color:rgba(180,150,120,0.35);margin:0 -9px;z-index:2}
.key.black:hover,.key.black.active{background:linear-gradient(180deg,rgba(90,55,20,0.95),rgba(70,40,12,0.92))}
select.ssel{background:rgba(0,0,0,0.4);color:rgba(200,170,130,0.8);border:1px solid rgba(255,160,60,0.2);border-radius:8px;padding:2px 4px;font-size:8px;font-family:inherit;cursor:pointer;outline:none}
#mic-meter{width:60px;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
#mic-meter-fill{height:100%;width:0%;background:linear-gradient(90deg,#4f4,#ff0,#f44);border-radius:3px;transition:width 0.1s}
</style>
</head>
<body>
<div id="audio-prompt">click to begin</div>

<div id="perf-panel">
 <div id="transport">
  <span class="lbl">BPM</span><input type="range" class="sl" style="width:90px" id="sl-bpm" min="50" max="180" value="110" oninput="C.setBPM(+this.value)"><span id="bpm-val">110</span>
  <button class="btn" onclick="C.tapTempo()">TAP</button>
  <span style="flex:0.3"></span>
  <span class="lbl">SCALE</span>
  <select class="ssel" id="sel-scale" onchange="C.setScale(this.value)">
   <option value="major">Major</option><option value="dorian" selected>Dorian</option><option value="mixo">Mixolydian</option>
   <option value="minor">Minor</option><option value="blues">Blues</option><option value="penta">Pentatonic</option>
   <option value="tizita">Tizita</option><option value="thai">Thai</option>
  </select>
  <span class="lbl">KEY</span>
  <select class="ssel" id="sel-key" onchange="C.setKey(+this.value)">
   <option value="0">C</option><option value="1">Db</option><option value="2">D</option><option value="3">Eb</option><option value="4">E</option><option value="5">F</option>
   <option value="6">Gb</option><option value="7">G</option><option value="8">Ab</option><option value="9">A</option><option value="10">Bb</option><option value="11">B</option>
  </select>
  <span style="flex:0.3"></span>
  <button class="btn rec" id="btn-rec" onclick="C.toggleRec()">REC</button>
  <button class="btn" id="btn-dl" onclick="C.downloadRec()" style="display:none">SAVE WAV</button>
  <span style="flex:0.3"></span>
  <span class="lbl">MASTER</span><input type="range" class="sl" style="width:50px" min="0" max="100" value="75" oninput="C.setMaster(+this.value)">
 </div>
 <div id="sections">
  <div class="section">
   <div class="sec-title">drums</div>
   <div class="ctrl-row">
    <button class="btn on" id="btn-drums" onclick="C.toggleDrums()">ON</button>
    <button class="btn on" data-ds="jazz" onclick="C.setDS('jazz')">Jazz</button>
    <button class="btn" data-ds="thai" onclick="C.setDS('thai')">Thai</button>
    <button class="btn" data-ds="ethio" onclick="C.setDS('ethio')">Ethio</button>
   </div>
   <div class="ctrl-row">
    <span class="lbl">SWG</span><input type="range" class="sl" min="0" max="100" value="55" oninput="C.setSwing(+this.value)">
    <span class="lbl">VOL</span><input type="range" class="sl" style="width:45px" min="0" max="100" value="60" oninput="C.setDV(+this.value)">
   </div>
   <div class="ctrl-row">
    <span class="lbl">KICK</span><input type="range" class="sl" style="width:45px" min="0" max="100" value="80" oninput="C.setKickVol(+this.value)">
    <span class="lbl">SNR</span><input type="range" class="sl" style="width:45px" min="0" max="100" value="65" oninput="C.setSnrVol(+this.value)">
    <span class="lbl">HAT</span><input type="range" class="sl" style="width:45px" min="0" max="100" value="50" oninput="C.setHatVol(+this.value)">
   </div>
  </div>
  <div class="section">
   <div class="sec-title">bass</div>
   <div class="ctrl-row">
    <button class="btn on" id="btn-bass" onclick="C.toggleBass()">ON</button>
    <button class="btn on" data-bs="walk" onclick="C.setBS('walk')">Walk</button>
    <button class="btn" data-bs="root" onclick="C.setBS('root')">Root</button>
    <button class="btn" data-bs="octave" onclick="C.setBS('octave')">Oct</button>
    <button class="btn" data-bs="fifths" onclick="C.setBS('fifths')">1-5</button>
   </div>
   <div class="ctrl-row">
    <span class="lbl">VOL</span><input type="range" class="sl" min="0" max="100" value="55" oninput="C.setBV(+this.value)">
    <span class="lbl">TONE</span><input type="range" class="sl" style="width:45px" min="0" max="100" value="40" oninput="C.setBT(+this.value)">
    <span class="lbl">OCT</span>
    <select class="ssel" onchange="C.setBassOct(+this.value)"><option value="0">Low</option><option value="1" selected>Mid</option><option value="2">Hi</option></select>
   </div>
  </div>
  <div class="section" style="flex:2;min-width:280px">
   <div class="sec-title">organ — keys: Z-/ white, S D F G H J K black</div>
   <div id="keyboard"></div>
  </div>
  <div class="section">
   <div class="sec-title">mic / input</div>
   <div class="ctrl-row">
    <button class="btn grn" id="btn-mic" onclick="C.toggleMic()">MIC</button>
    <div id="mic-meter"><div id="mic-meter-fill"></div></div>
   </div>
   <div class="ctrl-row">
    <span class="lbl">GAIN</span><input type="range" class="sl" min="0" max="200" value="100" oninput="C.setMicGain(+this.value)">
   </div>
   <div class="ctrl-row">
    <span class="lbl">EQ LO</span><input type="range" class="sl" style="width:40px" min="-12" max="12" value="0" oninput="C.setMicEQ('lo',+this.value)">
    <span class="lbl">HI</span><input type="range" class="sl" style="width:40px" min="-12" max="12" value="0" oninput="C.setMicEQ('hi',+this.value)">
   </div>
  </div>
  <div class="section">
   <div class="sec-title">fx / drone</div>
   <div class="ctrl-row">
    <button class="btn on" id="btn-drone" onclick="C.toggleDrone()">DRONE</button>
    <span class="lbl">LVL</span><input type="range" class="sl" style="width:45px" min="0" max="100" value="35" oninput="C.setDL(+this.value)">
   </div>
   <div class="ctrl-row">
    <span class="lbl">VERB</span><input type="range" class="sl" min="0" max="100" value="50" oninput="C.setVerb(+this.value)">
    <span class="lbl">DLY</span><input type="range" class="sl" style="width:45px" min="0" max="100" value="20" oninput="C.setDelay(+this.value)">
   </div>
  </div>
 </div>
</div>

<script src="three.min.js"></script>
<script src="pp/CopyShader.js"></script>
<script src="pp/LuminosityHighPassShader.js"></script>
<script src="pp/EffectComposer.js"></script>
<script src="pp/RenderPass.js"></script>
<script src="pp/ShaderPass.js"></script>
<script src="pp/UnrealBloomPass.js"></script>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// BACKEND STATE
// ═════════════════════════════════════════════════════════════════════════════
const WS_URL=`ws://${location.hostname}:8765`;
let S={oscillator:{x:0,y:0,z:0,w:0.5},fourier:new Array(32).fill(0),block:{number:0,time_variance:0.1},phase:0,amplitude:0.5,tempo:0.5,sine_mix:0,tokens:[]};
let ST=JSON.parse(JSON.stringify(S));
function lerpV(a,b,t){return a+(b-a)*t}
function lerpState(){const L=0.07;
S.oscillator.x=lerpV(S.oscillator.x,ST.oscillator.x,L);S.oscillator.y=lerpV(S.oscillator.y,ST.oscillator.y,L);
S.oscillator.z=lerpV(S.oscillator.z,ST.oscillator.z,L);S.oscillator.w=lerpV(S.oscillator.w,ST.oscillator.w,L);
S.phase=lerpV(S.phase,ST.phase,L);S.amplitude=lerpV(S.amplitude,ST.amplitude,L);
S.tempo=lerpV(S.tempo,ST.tempo,L);S.sine_mix=lerpV(S.sine_mix,ST.sine_mix,L);
S.block.time_variance=lerpV(S.block.time_variance,ST.block.time_variance,L);
for(let i=0;i<32;i++)S.fourier[i]=lerpV(S.fourier[i]||0,ST.fourier[i]||0,L);}
let drumImpact=0;
let ws;(function cWS(){ws=new WebSocket(WS_URL);ws.onmessage=e=>{const d=JSON.parse(e.data);Object.assign(ST,d)};ws.onclose=()=>setTimeout(cWS,2000);ws.onerror=()=>ws.close()})();

// ═════════════════════════════════════════════════════════════════════════════
// THREE.JS SCENE — Solar System + Space Creatures
// ═════════════════════════════════════════════════════════════════════════════
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.toneMapping=THREE.ReinhardToneMapping;renderer.toneMappingExposure=1.8;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();scene.background=new THREE.Color(0x020206);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,800);camera.position.set(0,40,90);
const composer=new THREE.EffectComposer(renderer);composer.addPass(new THREE.RenderPass(scene,camera));
const bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.5,0.8,0.15);
composer.addPass(bloomPass);

// Stars
(function(){const N=6000,g=new THREE.BufferGeometry(),p=new Float32Array(N*3),c=new Float32Array(N*3);
for(let i=0;i<N;i++){const r=200+Math.random()*300,th=Math.random()*6.283,ph=Math.acos(2*Math.random()-1);
p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph);
const t=0.5+Math.random()*0.5;c[i*3]=0.7+t*0.3;c[i*3+1]=0.7+t*0.2;c[i*3+2]=0.8+t*0.2;}
g.setAttribute('position',new THREE.BufferAttribute(p,3));g.setAttribute('color',new THREE.BufferAttribute(c,3));
scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:0.7,vertexColors:true,transparent:true,opacity:0.6})));})();

// Sun
const sunMat=new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uW:{value:0.5},uImpact:{value:0}},
vertexShader:`varying vec3 vN;varying vec2 vU;void main(){vN=normalize(normalMatrix*normal);vU=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
fragmentShader:`uniform float uTime,uW,uImpact;varying vec3 vN;varying vec2 vU;
vec3 hsl(float h,float s,float l){float c=(1.0-abs(2.0*l-1.0))*s;float x=c*(1.0-abs(mod(h*6.0,2.0)-1.0));float m=l-c*0.5;vec3 r;float hh=h*6.0;if(hh<1.0)r=vec3(c,x,0);else if(hh<2.0)r=vec3(x,c,0);else if(hh<3.0)r=vec3(0,c,x);else if(hh<4.0)r=vec3(0,x,c);else if(hh<5.0)r=vec3(x,0,c);else r=vec3(c,0,x);return r+m;}
void main(){float p=0.7+sin(uTime*1.5)*0.15+uImpact*0.4;float f=pow(1.0-abs(dot(vN,vec3(0,0,1))),2.0);float n=sin(vU.x*30.0+uTime*2.0)*sin(vU.y*25.0+uTime*1.5)*0.15;float h=mod(uW*0.8+0.08+n*0.1,1.0);gl_FragColor=vec4(hsl(h,0.9,0.6)*p+hsl(mod(h+0.05,1.0),1.0,0.7)*f*1.5+n*0.3,1.0);}`});
const sun=new THREE.Mesh(new THREE.SphereGeometry(5,48,48),sunMat);scene.add(sun);
const gc=document.createElement('canvas');gc.width=gc.height=256;const gx=gc.getContext('2d'),gr=gx.createRadialGradient(128,128,0,128,128,128);
gr.addColorStop(0,'rgba(255,200,80,0.4)');gr.addColorStop(0.3,'rgba(255,140,40,0.15)');gr.addColorStop(1,'rgba(255,80,0,0)');
gx.fillStyle=gr;gx.fillRect(0,0,256,256);
const sunGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(gc),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
sunGlow.scale.set(30,30,1);scene.add(sunGlow);

// Planets
const PCFG=[{n:'ETH',r:1.8,o:14,s:.3,h:.6,rn:1},{n:'BTC',r:2.5,o:22,s:.15,h:.1,rn:0},{n:'SOL',r:1.2,o:30,s:.45,h:.45,rn:0},{n:'LINK',r:1,o:37,s:.35,h:.65,rn:1},{n:'UNI',r:.9,o:43,s:.5,h:.8,rn:0},{n:'AAVE',r:1.1,o:49,s:.25,h:.3,rn:0},{n:'ARB',r:.7,o:55,s:.55,h:.55,rn:1},{n:'OP',r:.8,o:60,s:.4,h:0,rn:0}];
const planets=[];
PCFG.forEach((c,i)=>{const g=new THREE.Group(),oc=new THREE.EllipseCurve(0,0,c.o,c.o*.92,0,Math.PI*2,false,0);
scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(oc.getPoints(128).map(p=>new THREE.Vector3(p.x,0,p.y))),new THREE.LineBasicMaterial({color:new THREE.Color().setHSL(c.h,.3,.12),transparent:true,opacity:.25})));
const pm=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(c.h,.7,.4),emissive:new THREE.Color().setHSL(c.h,.8,.15),roughness:.6,metalness:.3});
const pl=new THREE.Mesh(new THREE.SphereGeometry(c.r,32,32),pm);g.add(pl);
g.add(new THREE.Mesh(new THREE.SphereGeometry(c.r*1.25,16,16),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(c.h,.9,.5),transparent:true,opacity:.1,side:THREE.BackSide})));
if(c.rn){const rm=new THREE.Mesh(new THREE.RingGeometry(c.r*1.6,c.r*2.4,48),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(c.h,.5,.4),transparent:true,opacity:.2,side:THREE.DoubleSide}));rm.rotation.x=Math.PI*.45;g.add(rm);}
scene.add(g);planets.push({group:g,planet:pl,cfg:c,angle:i*Math.PI*.25});});
scene.add(new THREE.PointLight(0xffeedd,2.5,200));scene.add(new THREE.AmbientLight(0x112244,.3));
const sunLight=scene.children.find(c=>c.isPointLight);

// Dust belt
(function(){const N=8000,g=new THREE.BufferGeometry(),p=new Float32Array(N*3),d=new Float32Array(N);
for(let i=0;i<N;i++){const r=25+Math.random()*40,a=Math.random()*6.283;p[i*3]=Math.cos(a)*r;p[i*3+1]=(Math.random()-.5)*4;p[i*3+2]=Math.sin(a)*r;d[i]=Math.random();}
g.setAttribute('position',new THREE.BufferAttribute(p,3));g.setAttribute('aRand',new THREE.BufferAttribute(d,1));
const m=new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uW:{value:0.5},uImpact:{value:0}},
vertexShader:`uniform float uTime,uImpact;attribute float aRand;varying float vA,vH;void main(){vec3 p=position;float a=uTime*0.02*(0.5+aRand*0.5);float c=cos(a),s=sin(a);vec3 rp=vec3(p.x*c-p.z*s,p.y+sin(uTime*0.3+aRand*10.0)*0.5,p.x*s+p.z*c);rp*=1.0+uImpact*0.1;vec4 mv=modelViewMatrix*vec4(rp,1.0);gl_Position=projectionMatrix*mv;gl_PointSize=max(1.0,(1.5+aRand)*(150.0/-mv.z));vA=0.2+aRand*0.3;vH=aRand;}`,
fragmentShader:`varying float vA,vH;uniform float uW;vec3 hsl(float h,float s,float l){float c=(1.0-abs(2.0*l-1.0))*s;float x=c*(1.0-abs(mod(h*6.0,2.0)-1.0));float m=l-c*0.5;vec3 r;float hh=h*6.0;if(hh<1.0)r=vec3(c,x,0);else if(hh<2.0)r=vec3(x,c,0);else if(hh<3.0)r=vec3(0,c,x);else if(hh<4.0)r=vec3(0,x,c);else if(hh<5.0)r=vec3(x,0,c);else r=vec3(c,0,x);return r+m;}void main(){vec2 uv=gl_PointCoord-0.5;float d=length(uv);if(d>0.5)discard;float s=exp(-d*d*10.0);gl_FragColor=vec4(hsl(mod(vH+uW*0.5,1.0),0.5,0.5)*s*1.2,s*vA);}`,
transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
window._dustMat=m;scene.add(new THREE.Points(g,m));})();

// ═══ ORGANIC 3D CREATURES — Space Whales + Phoenix Birds ════════════════════
const creatures=[];

function buildWhale(hue,size){
  const group=new THREE.Group();
  const col=new THREE.Color().setHSL(hue,.8,.45);
  const glow=new THREE.Color().setHSL(hue,1,.6);
  const mat=new THREE.MeshStandardMaterial({color:col,emissive:glow,emissiveIntensity:.25,roughness:.5,metalness:.4,transparent:true,opacity:.85});
  // Body — elongated ellipsoid via scaled sphere
  const body=new THREE.Mesh(new THREE.SphereGeometry(1,24,16),mat);
  body.scale.set(size*1.2,size*.7,size*2.8);group.add(body);
  // Head bump
  const head=new THREE.Mesh(new THREE.SphereGeometry(1,16,12),mat.clone());
  head.scale.set(size*.65,size*.55,size*.7);head.position.z=size*2.4;group.add(head);
  // Eyes
  const eyeM=new THREE.MeshBasicMaterial({color:0xeeffff});
  const eL=new THREE.Mesh(new THREE.SphereGeometry(size*.08,8,8),eyeM);eL.position.set(-size*.35,size*.2,size*2.6);group.add(eL);
  const eR=eL.clone();eR.position.x=size*.35;group.add(eR);
  // Tail flukes — two flat scaled ellipsoids
  const flukeMat=mat.clone();flukeMat.transparent=true;flukeMat.opacity=.7;
  const flukeL=new THREE.Mesh(new THREE.SphereGeometry(1,12,8),flukeMat);

function buildPhoenix(hue,size){
  const group=new THREE.Group();
  const col=new THREE.Color().setHSL(hue,.9,.5);
  const glow=new THREE.Color().setHSL(hue,1,.65);
  const mat=new THREE.MeshStandardMaterial({color:col,emissive:glow,emissiveIntensity:.3,roughness:.4,metalness:.5,transparent:true,opacity:.8});
  // Body — tapered ellipsoid
  const body=new THREE.Mesh(new THREE.SphereGeometry(1,20,12),mat);
  body.scale.set(size*.4,size*.35,size*1.6);group.add(body);
  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(1,12,10),mat.clone());
  head.scale.set(size*.22,size*.2,size*.3);head.position.z=size*1.5;group.add(head);
  // Beak
  const beak=new THREE.Mesh(new THREE.ConeGeometry(size*.08,size*.3,6),new THREE.MeshStandardMaterial({color:0xffcc44,emissive:0xff8800,emissiveIntensity:.3}));
  beak.rotation.x=Math.PI/2;beak.position.z=size*1.75;group.add(beak);
  // Eyes
  const eyeM=new THREE.MeshBasicMaterial({color:0xffff88});
  const eL=new THREE.Mesh(new THREE.SphereGeometry(size*.04,6,6),eyeM);eL.position.set(-size*.14,size*.1,size*1.55);group.add(eL);
  const eR=eL.clone();eR.position.x=size*.14;group.add(eR);
  // Wings — wide ellipsoid flats
  const wingMat=mat.clone();wingMat.transparent=true;wingMat.opacity=.6;wingMat.side=THREE.DoubleSide;
  const wingL=new THREE.Mesh(new THREE.SphereGeometry(1,14,6),wingMat);
  wingL.scale.set(size*2.2,size*.04,size*1);wingL.position.set(-size*.6,size*.1,0);group.add(wingL);
  const wingR=wingL.clone();wingR.position.x=size*.6;group.add(wingR);
  // Tail feathers — stretched thin ellipsoids
  const tailMat=mat.clone();tailMat.transparent=true;tailMat.opacity=.5;
  for(let i=0;i<3;i++){
    const t=new THREE.Mesh(new THREE.SphereGeometry(1,8,4),tailMat);
    t.scale.set(size*.15,size*.03,size*(1.5+i*.4));
    t.position.set((i-1)*size*.2,0,-size*(1.8+i*.2));
    t.rotation.y=(i-1)*.1;group.add(t);
  }
  // Fire trail
  const fc=document.createElement('canvas');fc.width=fc.height=64;const fx=fc.getContext('2d'),fg=fx.createRadialGradient(32,32,0,32,32,32);
  fg.addColorStop(0,'rgba(255,200,50,0.7)');fg.addColorStop(0.5,'rgba(255,80,0,0.25)');fg.addColorStop(1,'rgba(255,30,0,0)');
  fx.fillStyle=fg;fx.fillRect(0,0,64,64);
  const fire=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(fc),transparent:true,blending:THREE.AdditiveBlending}));
  fire.scale.set(size*2,size*2,1);fire.position.z=-size*2.5;group.add(fire);

  scene.add(group);
  return{group,body,wingL,wingR,fire,hue,mat};
}

function updateCreatures(t){
  creatures.forEach(cr=>{
    const a=t*cr.orbitSpeed+cr.phase;
    const r=cr.orbitR+Math.sin(t*.12+cr.phase)*10+drumImpact*5;
    const x=Math.cos(a)*r,z=Math.sin(a)*r*.9;
    const y=Math.sin(a*1.3+cr.phase)*cr.yAmp+Math.sin(t*.25)*3;
    cr.group.position.set(x,y,z);
    // Face direction
    const na=a+.015,nx=Math.cos(na)*r,nz=Math.sin(na)*r*.9;
    cr.group.lookAt(nx,y+Math.sin(t*.4)*2,nz);
    // Organic undulation
    const wave=Math.sin(t*1.2+cr.phase)*.08;
    cr.group.rotation.z=wave;
    if(cr.isWhale){
      // Whale: fins sweep, tail flukes wave
      const finWave=Math.sin(t*cr.flapSpeed)*.25;
      cr.finL.rotation.z=.2+finWave+drumImpact*.3;
      cr.finR.rotation.z=-.2-finWave-drumImpact*.3;
      cr.flukeL.rotation.x=Math.sin(t*1.5+cr.phase)*.3;
      cr.flukeR.rotation.x=Math.sin(t*1.5+cr.phase)*.3;
      cr.body.scale.y=cr.group.scale.y*(1+Math.sin(t*.8)*.03); // breathing
    }else{
      // Phoenix: wing flap + fire trail
      const flap=Math.sin(t*cr.flapSpeed)*.4+drumImpact*.5;
      cr.wingL.rotation.z=.1+flap;cr.wingR.rotation.z=-.1-flap;
      cr.fire.scale.setScalar(1.5+drumImpact*4+Math.sin(t*2)*.4);
      cr.fire.material.opacity=.25+drumImpact*.5;
    }
    const h=(cr.hue+S.oscillator.w*.3+t*.008)%1;
    cr.mat.emissive.setHSL(h,1,.18+drumImpact*.15);
  });
}

  case 'snare':{const o=ax.createOscillator(),g=ax.createGain();o.type='triangle';o.frequency.setValueAtTime(200,time);o.frequency.exponentialRampToValueAtTime(120,time+.08);g.gain.setValueAtTime(v*.5,time);g.gain.exponentialRampToValueAtTime(.001,time+.15);o.connect(g).connect(dst);o.start(time);o.stop(time+.2);const n=ax.createBufferSource();n.buffer=noiseBuf(.1);const ng=ax.createGain(),nf=ax.createBiquadFilter();nf.type='highpass';nf.frequency.value=2000;ng.gain.setValueAtTime(v*.35,time);ng.gain.exponentialRampToValueAtTime(.001,time+.12);n.connect(nf).connect(ng).connect(dst);n.start(time);n.stop(time+.15);tImpact(time,vel*.5);break;}
  case 'snare_g':{const n=ax.createBufferSource();n.buffer=noiseBuf(.04);const g=ax.createGain(),f=ax.createBiquadFilter();f.type='highpass';f.frequency.value=3000;g.gain.setValueAtTime(v*.12,time);g.gain.exponentialRampToValueAtTime(.001,time+.05);n.connect(f).connect(g).connect(dst);n.start(time);n.stop(time+.06);break;}
  case 'klong':{const o=ax.createOscillator(),g=ax.createGain();o.type='sine';o.frequency.setValueAtTime(90,time);o.frequency.exponentialRampToValueAtTime(38,time+.3);g.gain.setValueAtTime(v,time);g.gain.exponentialRampToValueAtTime(.001,time+.45);o.connect(g).connect(dst);o.start(time);o.stop(time+.5);tImpact(time,vel);break;}
  case 'ching_o':{const o=ax.createOscillator(),g=ax.createGain();o.type='square';o.frequency.value=1800;g.gain.setValueAtTime(v*.12,time);g.gain.exponentialRampToValueAtTime(.001,time+.35);const f=ax.createBiquadFilter();f.type='bandpass';f.frequency.value=2200;f.Q.value=12;o.connect(f).connect(g).connect(dst);o.start(time);o.stop(time+.4);break;}
  case 'ching_c':{const o=ax.createOscillator(),g=ax.createGain();o.type='square';o.frequency.value=1600;g.gain.setValueAtTime(v*.1,time);g.gain.exponentialRampToValueAtTime(.001,time+.04);const f=ax.createBiquadFilter();f.type='bandpass';f.frequency.value=2000;f.Q.value=10;o.connect(f).connect(g).connect(dst);o.start(time);o.stop(time+.06);break;}

function tImpact(time,vel){const d=Math.max(0,(time-ax.currentTime)*1000);setTimeout(()=>{drumImpact=Math.max(drumImpact,vel)},d);}

let bassIdx=0;
function synthBass(time,midi,dur){if(!P.bassOn)return;const freq=m2f(midi),v=P.bassVol*.3;
const o1=ax.createOscillator(),g1=ax.createGain();o1.type='sine';o1.frequency.value=freq;
g1.gain.setValueAtTime(v,time);g1.gain.setValueAtTime(v*.8,time+dur*.6);g1.gain.exponentialRampToValueAtTime(.001,time+dur*.95);
const f=ax.createBiquadFilter();f.type='lowpass';f.frequency.value=400+P.bassTone*600;
o1.connect(f).connect(g1).connect(dryG);o1.start(time);o1.stop(time+dur);
const o2=ax.createOscillator(),g2=ax.createGain();o2.type='triangle';o2.frequency.value=freq;
g2.gain.setValueAtTime(v*.3,time);g2.gain.exponentialRampToValueAtTime(.001,time+dur*.7);
o2.connect(g2).connect(dryG);o2.start(time);o2.stop(time+dur);}

function getBassNote(beat){
  const sc=SCALES[P.scale],baseOct=24+P.bassOct*12;
  if(P.bassStyle==='root')return P.key+sc[0]+baseOct;
  if(P.bassStyle==='octave')return P.key+sc[0]+(beat%2===0?baseOct:baseOct+12);
  if(P.bassStyle==='fifths'){const deg=beat%2===0?0:(sc.indexOf(7)>=0?sc.indexOf(7):3);return P.key+sc[deg%sc.length]+baseOct;}
  // Walking
  const deg=bassIdx%sc.length;let note=P.key+sc[deg]+baseOct;bassIdx++;
  if(Math.random()<.2){const nd=(deg+1)%sc.length;note=P.key+sc[nd]+baseOct-1;}
  return note;}

// ── Organ ──
const orgNotes=new Map();
function playOrg(midi){if(!ax||!audioStarted||orgNotes.has(midi))return;
const freq=m2f(midi),v=.06;
const harms=[.5,1,2,3,4],gains=[.6,1,.7,.3,.2],oscs=[];
const ng=ax.createGain();ng.gain.setValueAtTime(0,ax.currentTime);ng.gain.linearRampToValueAtTime(v,ax.currentTime+.015);
const lfo=ax.createOscillator();lfo.type='sine';lfo.frequency.value=5.5;const lfog=ax.createGain();lfog.gain.value=3;lfo.connect(lfog);lfo.start();
for(let i=0;i<harms.length;i++){const o=ax.createOscillator();o.type='sine';o.frequency.value=freq*harms[i];lfog.connect(o.frequency);const g=ax.createGain();g.gain.value=gains[i];o.connect(g).connect(ng);o.start();oscs.push(o);}
ng.connect(dryG);orgNotes.set(midi,{oscs,g:ng,lfo});}
function stopOrg(midi){if(!orgNotes.has(midi))return;const n=orgNotes.get(midi),now=ax.currentTime;
n.g.gain.cancelScheduledValues(now);n.g.gain.setValueAtTime(n.g.gain.value,now);n.g.gain.exponentialRampToValueAtTime(.001,now+.12);
setTimeout(()=>{n.oscs.forEach(o=>o.stop());n.lfo.stop()},150);orgNotes.delete(midi);}

// Chromatic semitones for white keys: C D E F G A B C D E

function buildKB(){
  const kb=document.getElementById('keyboard');kb.innerHTML='';
  // 13 chromatic notes: C Db D Eb E F Gb G Ab A Bb B C

    {w:false,s:10,k:'J'},{w:true,s:11,k:'M'},{w:true,s:12,k:','},{w:false,s:13,k:'L'},{w:true,s:14,k:'.'},
    {w:false,s:15,k:';'},{w:true,s:16,k:'/'}

    el.addEventListener('mousedown',e=>{e.preventDefault();playOrg(midi);el.classList.add('active')});
    el.addEventListener('mouseup',()=>{stopOrg(midi);el.classList.remove('active')});
    el.addEventListener('mouseleave',()=>{stopOrg(midi);el.classList.remove('active')});
    el.addEventListener('touchstart',e=>{e.preventDefault();playOrg(midi);el.classList.add('active')},{passive:false});
    el.addEventListener('touchend',()=>{stopOrg(midi);el.classList.remove('active')});
    kb.appendChild(el);
  });
}

// PC Keyboard mapping
const held=new Set();
function keyToMidi(key){
  const k=key.toLowerCase();
  const wi=WHITE_KEYS.indexOf(k);
  if(wi>=0)return P.key+60+WHITE_SEMI[wi];
  if(BLACK_MAP[k]!==undefined)return P.key+60+BLACK_MAP[k];
  return null;
}
document.addEventListener('keydown',e=>{
  if(e.repeat||!audioStarted||e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;
  const midi=keyToMidi(e.key);if(midi===null)return;e.preventDefault();
  if(!held.has(e.key.toLowerCase())){held.add(e.key.toLowerCase());playOrg(midi);
  const el=document.querySelector(`.key[data-midi="${midi}"]`);if(el)el.classList.add('active');}
});
document.addEventListener('keyup',e=>{
  const midi=keyToMidi(e.key);if(midi===null)return;
  held.delete(e.key.toLowerCase());stopOrg(midi);
  const el=document.querySelector(`.key[data-midi="${midi}"]`);if(el)el.classList.remove('active');
});

// ── Microphone / Input ──
let micStream,micSource,micGainNode,micLoEQ,micHiEQ,micAnalyser,micOn=false;
async function startMic(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    micSource=ax.createMediaStreamSource(micStream);
    micGainNode=ax.createGain();micGainNode.gain.value=1;
    micLoEQ=ax.createBiquadFilter();micLoEQ.type='lowshelf';micLoEQ.frequency.value=300;micLoEQ.gain.value=0;
    micHiEQ=ax.createBiquadFilter();micHiEQ.type='highshelf';micHiEQ.frequency.value=3000;micHiEQ.gain.value=0;
    micAnalyser=ax.createAnalyser();micAnalyser.fftSize=256;
    micSource.connect(micGainNode).connect(micLoEQ).connect(micHiEQ).connect(micAnalyser).connect(dryG);
    micOn=true;document.getElementById('btn-mic').classList.add('on');
  }catch(e){console.warn('Mic error:',e);}
}
function stopMic(){
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micSource.disconnect();}
  micOn=false;document.getElementById('btn-mic').classList.remove('on');
}
function updateMicMeter(){
  if(!micOn||!micAnalyser)return;
  const d=new Uint8Array(micAnalyser.frequencyBinCount);micAnalyser.getByteFrequencyData(d);
  let sum=0;for(let i=0;i<d.length;i++)sum+=d[i];
  const avg=sum/d.length/255*100;
  document.getElementById('mic-meter-fill').style.width=avg+'%';
}

// ── Recording ──
let mediaRec,recChunks=[],isRec=false;
function startRec(){
  const dest=ax.createMediaStreamDestination();
  masterG.connect(dest);
  mediaRec=new MediaRecorder(dest.stream,{mimeType:'audio/webm'});
  recChunks=[];
  mediaRec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data)};
  mediaRec.onstop=()=>{document.getElementById('btn-dl').style.display='inline-block'};
  mediaRec.start();isRec=true;
  document.getElementById('btn-rec').classList.add('on');
}
function stopRec(){
  if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();
  isRec=false;document.getElementById('btn-rec').classList.remove('on');
}
function downloadRec(){
  if(!recChunks.length)return;
  const blob=new Blob(recChunks,{type:'audio/webm'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='token-oscillator-'+Date.now()+'.webm';
  a.click();URL.revokeObjectURL(url);
}

// ── Scheduler ──
function scheduleLoop(){
  if(!ax)return;
  const pat=DPAT[P.drumStyle],patLen=pat.len,six=(60/P.bpm)/4,qtr=six*4;
  while(nextBT<ax.currentTime+.25){
    if(P.drumsOn)for(const[off,type,vel]of pat.hits){let t=nextBT+off*six;if(off%2===1)t+=six*P.swing*.45;t+=(Math.random()-.5)*.006;synthD(t,type,vel);}
    if(P.bassOn)for(let q=0;q<patLen/4;q++){const bT=nextBT+q*qtr;synthBass(bT,getBassNote(beatN+q),qtr*.9);}
    beatN+=patLen/4;nextBT+=patLen*six;}
  setTimeout(scheduleLoop,100);
}

// Drone
let droneO1,droneO2,droneGN;

function startAudio(){
  if(audioStarted)return;audioStarted=true;
  ax=new(window.AudioContext||window.webkitAudioContext)();
  masterG=ax.createGain();masterG.gain.value=P.masterVol;masterG.connect(ax.destination);
  dryG=ax.createGain();dryG.gain.value=1;
  wetG=ax.createGain();wetG.gain.value=P.reverbMix*.5;
  reverbNode=mkReverb();dryG.connect(masterG);dryG.connect(reverbNode);reverbNode.connect(wetG);wetG.connect(masterG);
  // Delay
  delayNode=ax.createDelay(.5);delayNode.delayTime.value=.3;
  const delayFb=ax.createGain();delayFb.gain.value=.35;
  delayG=ax.createGain();delayG.gain.value=P.delayMix*.4;
  dryG.connect(delayNode);delayNode.connect(delayFb);delayFb.connect(delayNode);delayNode.connect(delayG);delayG.connect(masterG);
  // Drone
  droneGN=ax.createGain();droneGN.gain.value=P.droneLvl*.06;droneGN.connect(masterG);
  droneO1=ax.createOscillator();droneO1.type='sine';droneO1.frequency.value=m2f(P.key+36);droneO1.connect(droneGN);droneO1.start();
  droneO2=ax.createOscillator();droneO2.type='triangle';droneO2.frequency.value=m2f(P.key+43);const dg=ax.createGain();dg.gain.value=.4;droneO2.connect(dg).connect(droneGN);droneO2.start();
  nextBT=ax.currentTime+.1;scheduleLoop();buildKB();
  document.getElementById('audio-prompt').classList.add('hidden');
}

document.addEventListener('click',e=>{if(!e.target.closest('#perf-panel'))startAudio();},{once:true});

// ── Controls ──
let tapTs=[];
const C={
  setBPM(v){P.bpm=v;document.getElementById('bpm-val').textContent=v},
  tapTempo(){const n=performance.now();tapTs.push(n);tapTs=tapTs.filter(t=>n-t<3000);if(tapTs.length>=3){let s=0;for(let i=1;i<tapTs.length;i++)s+=tapTs[i]-tapTs[i-1];const b=Math.round(60000/(s/(tapTs.length-1)));if(b>=50&&b<=180){P.bpm=b;document.getElementById('sl-bpm').value=b;document.getElementById('bpm-val').textContent=b;}}},
  setScale(v){P.scale=v;buildKB()},
  setKey(v){P.key=v;buildKB();if(droneO1){droneO1.frequency.setTargetAtTime(m2f(v+36),ax.currentTime,.3);droneO2.frequency.setTargetAtTime(m2f(v+43),ax.currentTime,.3);}},
  setMaster(v){P.masterVol=v/100;if(masterG)masterG.gain.setTargetAtTime(P.masterVol,ax.currentTime,.1)},
  toggleDrums(){P.drumsOn=!P.drumsOn;const b=document.getElementById('btn-drums');b.classList.toggle('on',P.drumsOn);b.textContent=P.drumsOn?'ON':'OFF'},
  toggleBass(){P.bassOn=!P.bassOn;const b=document.getElementById('btn-bass');b.classList.toggle('on',P.bassOn);b.textContent=P.bassOn?'ON':'OFF'},
  toggleDrone(){P.droneOn=!P.droneOn;const b=document.getElementById('btn-drone');b.classList.toggle('on',P.droneOn);b.textContent=P.droneOn?'DRONE':'OFF';if(droneGN)droneGN.gain.setTargetAtTime(P.droneOn?P.droneLvl*.06:0,ax.currentTime,.2)},
  setSwing(v){P.swing=v/100},setDV(v){P.drumVol=v/100},setBV(v){P.bassVol=v/100},setBT(v){P.bassTone=v/100},
  setDL(v){P.droneLvl=v/100;if(droneGN&&P.droneOn)droneGN.gain.setTargetAtTime(P.droneLvl*.06,ax.currentTime,.2)},
  setVerb(v){P.reverbMix=v/100;if(wetG)wetG.gain.setTargetAtTime(P.reverbMix*.5,ax.currentTime,.2)},
  setDelay(v){P.delayMix=v/100;if(delayG)delayG.gain.setTargetAtTime(P.delayMix*.4,ax.currentTime,.2)},
  setDS(s){P.drumStyle=s;document.querySelectorAll('[data-ds]').forEach(b=>b.classList.toggle('on',b.dataset.ds===s))},
  setBS(s){P.bassStyle=s;document.querySelectorAll('[data-bs]').forEach(b=>b.classList.toggle('on',b.dataset.bs===s))},
  setBassOct(v){P.bassOct=v},
  setKickVol(v){P.kickVol=v/100},setSnrVol(v){P.snrVol=v/100},setHatVol(v){P.hatVol=v/100},
  toggleMic(){micOn?stopMic():startMic()},
  setMicGain(v){if(micGainNode)micGainNode.gain.setTargetAtTime(v/100,ax.currentTime,.1)},
  setMicEQ(band,v){if(band==='lo'&&micLoEQ)micLoEQ.gain.value=v;if(band==='hi'&&micHiEQ)micHiEQ.gain.value=v},
  toggleRec(){isRec?stopRec():startRec()},
  downloadRec(){downloadRec()},
};
window.C=C;

// Resize
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});

// ═════════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═════════════════════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const t=clock.getElapsedTime();lerpState();
  drumImpact*=.87;if(drumImpact<.01)drumImpact=0;
  sunMat.uniforms.uTime.value=t;sunMat.uniforms.uW.value=S.oscillator.w;sunMat.uniforms.uImpact.value=drumImpact;
  sun.scale.setScalar(1+Math.sin(t*.5)*.05+drumImpact*.3);
  sunGlow.scale.setScalar(28+drumImpact*15+Math.sin(t*.8)*3);
  if(sunLight){sunLight.color.setHSL(S.oscillator.w*.15+.08,.9,.6);sunLight.intensity=2.5+drumImpact*3;}
  const tk=ST.tokens||[];
  planets.forEach((p,i)=>{const to=tk[i]||{delta:0,volume:0};
  p.angle+=(p.cfg.s*.008)*(1+Math.abs(to.delta)*200);
  p.group.position.set(Math.cos(p.angle)*p.cfg.o,Math.sin(p.angle*2+i)*1.5,Math.sin(p.angle)*p.cfg.o*.92);
  p.planet.scale.setScalar(1+(to.volume||0)*.08+drumImpact*.15);
  const pH=(p.cfg.h+S.oscillator.w*.3)%1;p.planet.material.emissive.setHSL(pH,.8,.12+drumImpact*.15);p.planet.material.color.setHSL(pH,.7,.35+drumImpact*.1);
  p.planet.rotation.y+=.005+i*.001;});
  if(window._dustMat){window._dustMat.uniforms.uTime.value=t;window._dustMat.uniforms.uW.value=S.oscillator.w;window._dustMat.uniforms.uImpact.value=drumImpact;}
  updateCreatures(t);
  bloomPass.strength=1.2+Math.sin(t*S.tempo*Math.PI*2)*.4+drumImpact*2.5;
  scene.background.setRGB(.008+drumImpact*.02,.005+S.oscillator.w*.008,.02+drumImpact*.01);
  const cR=70+Math.sin(t*.04)*15,cY=25+Math.sin(t*.06)*12,sh=drumImpact;
  camera.position.set(Math.cos(t*.03)*cR+Math.sin(t*30)*sh,cY+Math.cos(t*25)*sh,Math.sin(t*.03)*cR);
  camera.lookAt(0,0,0);
  updateGlyphs(t);updateMicMeter();
  if(audioStarted&&droneGN){const bF=m2f(P.key+36)+S.oscillator.w*10;
  droneO1.frequency.setTargetAtTime(bF,ax.currentTime,.5);droneO2.frequency.setTargetAtTime(bF*1.5,ax.currentTime,.5);}
  composer.render();
}
animate();
