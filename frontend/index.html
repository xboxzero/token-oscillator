<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Token Oscillator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;user-select:none}
#start{position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;cursor:pointer}
#start span{color:rgba(140,200,255,0.7);font-size:15px;letter-spacing:4px;text-transform:uppercase;border:1px solid rgba(100,180,255,0.2);padding:18px 40px;border-radius:40px}
#start.gone{display:none}
#cv{position:fixed;top:0;left:0;width:100%;height:100%}
/* Panel */
#panel{position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(0,0,0,0.82);border-top:1px solid rgba(100,180,255,0.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;transition:transform 0.3s}
#panel.hidden{transform:translateY(100%)}
#bar{display:flex;align-items:center;gap:8px;padding:4px 10px;border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
#secs{display:flex;gap:0;flex-wrap:wrap}
.sec{flex:1;min-width:120px;padding:5px 8px;border-right:1px solid rgba(255,255,255,0.04);display:flex;flex-direction:column;gap:3px}
.sec:last-child{border-right:none}
.st{color:rgba(100,180,255,0.5);font-size:7px;letter-spacing:2px;text-transform:uppercase;text-align:center}
.cr{display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap}
.sl{-webkit-appearance:none;width:55px;height:2px;border-radius:2px;background:rgba(255,255,255,0.07);outline:none;cursor:pointer}
.sl::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:radial-gradient(circle,rgba(100,180,255,0.8),rgba(40,100,200,0.5));border:1px solid rgba(140,200,255,0.3);cursor:pointer}
.lb{color:rgba(160,190,220,0.45);font-size:7px;min-width:22px;text-align:right}
.bt{background:rgba(255,255,255,0.04);color:rgba(160,190,220,0.6);border:1px solid rgba(100,180,255,0.12);border-radius:10px;padding:2px 7px;font-size:8px;cursor:pointer;font-family:inherit;transition:all 0.15s;letter-spacing:1px}
.bt:hover{background:rgba(100,180,255,0.1)}
.bt.on{background:rgba(60,140,255,0.2);border-color:rgba(100,180,255,0.4);color:rgba(180,220,255,0.9)}
.bt.rec{border-color:rgba(255,60,60,0.3);color:rgba(255,100,100,0.7)}
.bt.rec.on{background:rgba(255,40,40,0.35);border-color:rgba(255,80,80,0.6);color:#fff;animation:rp 1s infinite}
.bt.siren{background:rgba(255,80,0,0.15);border-color:rgba(255,120,30,0.3);color:rgba(255,160,80,0.8);font-size:9px;padding:4px 10px}
.bt.siren:active{background:rgba(255,80,0,0.4)}
@keyframes rp{0%,100%{opacity:1}50%{opacity:0.4}}
#bv{color:rgba(100,180,255,0.6);font-size:9px;min-width:30px;text-align:center}
select.ss{background:rgba(0,0,0,0.5);color:rgba(160,190,220,0.7);border:1px solid rgba(100,180,255,0.15);border-radius:6px;padding:1px 3px;font-size:7px;font-family:inherit;cursor:pointer;outline:none}
/* Keyboard */
#kb{display:flex;height:38px;justify-content:center;padding:1px 0}
.ky{position:relative;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;font-size:6px;transition:background 0.06s}
.ky.w{width:22px;height:36px;border-radius:0 0 3px 3px;background:linear-gradient(180deg,rgba(220,230,240,0.9),rgba(200,210,220,0.85));border:1px solid rgba(60,80,120,0.2);color:rgba(60,80,100,0.4);margin:0 0.5px;z-index:1}
.ky.w:hover,.ky.w.a{background:linear-gradient(180deg,rgba(120,180,255,0.85),rgba(80,150,240,0.8))}
.ky.b{width:15px;height:22px;border-radius:0 0 2px 2px;background:linear-gradient(180deg,rgba(30,40,60,0.95),rgba(15,20,35,0.92));border:1px solid rgba(60,80,120,0.35);color:rgba(120,150,180,0.3);margin:0 -7.5px;z-index:2}
.ky.b:hover,.ky.b.a{background:linear-gradient(180deg,rgba(40,80,160,0.9),rgba(30,60,130,0.85))}
/* Mic meter */
#mm{width:45px;height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle}
#mf{height:100%;width:0%;background:linear-gradient(90deg,#4a8,#ff0,#f44);border-radius:2px;transition:width 0.08s}
/* Fullscreen + toggle */
#fs-btn,#tog-btn{position:fixed;z-index:20;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.5);border:1px solid rgba(100,180,255,0.15);color:rgba(140,200,255,0.5);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
#fs-btn{top:10px;right:10px}
#tog-btn{bottom:10px;right:10px;font-size:10px}
#fs-btn:hover,#tog-btn:hover{background:rgba(60,140,255,0.15);border-color:rgba(100,180,255,0.4)}
</style>
</head>
<body>
<div id="start" onclick="initAudio()"><span>click to begin</span></div>
<canvas id="cv"></canvas>
<button id="fs-btn" onclick="toggleFS()" title="Fullscreen">&#x26F6;</button>
<button id="tog-btn" onclick="togglePanel()" title="Toggle panel">&#x25BC;</button>

<div id="panel">
 <div id="bar">
  <span class="lb">BPM</span><input type="range" class="sl" style="width:70px" id="sl-bpm" min="50" max="180" value="110" oninput="C.bpm(+this.value)"><span id="bv">110</span>
  <button class="bt" onclick="C.tap()">TAP</button>
  <span class="lb">SCALE</span>
  <select class="ss" onchange="C.scale(this.value)"><option value="major">Major</option><option value="dorian" selected>Dorian</option><option value="mixo">Mixolydian</option><option value="minor">Minor</option><option value="blues">Blues</option><option value="penta">Penta</option><option value="tizita">Tizita</option></select>
  <span class="lb">KEY</span>
  <select class="ss" onchange="C.key(+this.value)"><option value="0">C</option><option value="2">D</option><option value="4">E</option><option value="5">F</option><option value="7">G</option><option value="9">A</option><option value="11">B</option></select>
  <span style="flex:1"></span>
  <button class="bt rec" id="brec" onclick="C.rec()">REC</button>
  <button class="bt" id="bdl" onclick="C.dl()" style="display:none">SAVE</button>
  <span class="lb">VOL</span><input type="range" class="sl" style="width:40px" min="0" max="100" value="75" oninput="C.master(+this.value)">
 </div>
 <div id="secs">
  <!-- Drums -->
  <div class="sec">
   <div class="st">drums</div>
   <div class="cr">
    <button class="bt on" id="bd" onclick="C.togD()">ON</button>
    <button class="bt on" data-ds="jazz" onclick="C.ds('jazz')">Jazz</button>
    <button class="bt" data-ds="thai" onclick="C.ds('thai')">Thai</button>
    <button class="bt" data-ds="ethio" onclick="C.ds('ethio')">Ethio</button>
   </div>
   <div class="cr">
    <span class="lb">KCK</span><input type="range" class="sl" style="width:35px" min="0" max="100" value="80" oninput="P.kickV=this.value/100">
    <span class="lb">SNR</span><input type="range" class="sl" style="width:35px" min="0" max="100" value="65" oninput="P.snrV=this.value/100">
    <span class="lb">HAT</span><input type="range" class="sl" style="width:35px" min="0" max="100" value="50" oninput="P.hatV=this.value/100">
   </div>
   <div class="cr">
    <span class="lb">SWG</span><input type="range" class="sl" style="width:40px" min="0" max="100" value="55" oninput="P.swing=this.value/100">
    <span class="lb">VOL</span><input type="range" class="sl" style="width:40px" min="0" max="100" value="60" oninput="P.dVol=this.value/100">
   </div>
  </div>
  <!-- Bass -->
  <div class="sec">
   <div class="st">bass</div>
   <div class="cr">
    <button class="bt on" id="bb" onclick="C.togB()">ON</button>
    <button class="bt on" data-bs="walk" onclick="C.bs('walk')">Walk</button>
    <button class="bt" data-bs="root" onclick="C.bs('root')">Root</button>
    <button class="bt" data-bs="fifth" onclick="C.bs('fifth')">1-5</button>
   </div>
   <div class="cr"><span class="lb">VOL</span><input type="range" class="sl" min="0" max="100" value="55" oninput="P.bVol=this.value/100"><span class="lb">TONE</span><input type="range" class="sl" style="width:40px" min="0" max="100" value="40" oninput="P.bTone=this.value/100"></div>
  </div>
  <!-- Organ -->
  <div class="sec" style="flex:2;min-width:220px">
   <div class="st">organ — Z X C V B N M , . / &nbsp; black: S D G H J L</div>
   <div id="kb"></div>
  </div>
  <!-- FX -->
  <div class="sec">
   <div class="st">fx chain</div>
   <div class="cr">
    <span class="lb">DRIVE</span><input type="range" class="sl" min="0" max="100" value="0" oninput="C.fx('drive',+this.value)">
    <span class="lb">PHASE</span><input type="range" class="sl" min="0" max="100" value="0" oninput="C.fx('phaser',+this.value)">
   </div>
   <div class="cr">
    <span class="lb">VERB</span><input type="range" class="sl" min="0" max="100" value="40" oninput="C.fx('reverb',+this.value)">
    <span class="lb">ECHO</span><input type="range" class="sl" min="0" max="100" value="15" oninput="C.fx('delay',+this.value)">
   </div>
   <div class="cr">
    <button class="bt siren" id="bsiren" onmousedown="C.sirenOn()" onmouseup="C.sirenOff()" ontouchstart="C.sirenOn()" ontouchend="C.sirenOff()">DUB SIREN</button>
   </div>
  </div>
  <!-- Mic -->
  <div class="sec">
   <div class="st">mic</div>
   <div class="cr"><button class="bt" id="bmic" onclick="C.mic()">MIC</button><div id="mm"><div id="mf"></div></div></div>
   <div class="cr"><span class="lb">GAIN</span><input type="range" class="sl" min="0" max="200" value="100" oninput="C.micG(+this.value)"></div>
   <div class="cr"><span class="lb">LO</span><input type="range" class="sl" style="width:35px" min="-12" max="12" value="0" oninput="C.micEQ('lo',+this.value)"><span class="lb">HI</span><input type="range" class="sl" style="width:35px" min="-12" max="12" value="0" oninput="C.micEQ('hi',+this.value)"></div>
  </div>
 </div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// VISUAL ENGINE — Flowing Water Waveforms
// ═════════════════════════════════════════════════════════════════════════════
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();addEventListener('resize',resize);

// Waveform state driven by keyboard + backend
const WAVE_LINES=18;
const waveState={hue:200,targetHue:200,amp:0,targetAmp:0,freq:1,targetFreq:1,noteVel:0,bassAmp:0,drumHit:0};
// Color palette per active note
let activeNoteHues=[];

function drawWaves(t){
  // Background fade
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.fillRect(0,0,W,H);

  const panelH=document.getElementById('panel').classList.contains('hidden')?0:document.getElementById('panel').offsetHeight;
  const drawH=H-panelH;

  // Lerp wave state
  waveState.hue+=(waveState.targetHue-waveState.hue)*0.04;
  waveState.amp+=(waveState.targetAmp-waveState.amp)*0.06;
  waveState.freq+=(waveState.targetFreq-waveState.freq)*0.05;
  waveState.drumHit*=0.92;
  waveState.noteVel*=0.97;
  waveState.bassAmp*=0.95;

  // Backend data influence
  const bkW=bkState.oscillator?.w||0.5;
  const bkAmp=bkState.amplitude||0.5;

  for(let i=0;i<WAVE_LINES;i++){
    const pct=i/WAVE_LINES;
    const yBase=drawH*0.15+pct*drawH*0.7;
    // Hue shifts per line
    const lineHue=(waveState.hue+i*12+t*8)%360;
    const sat=60+waveState.noteVel*30;
    const lit=25+waveState.amp*20+waveState.drumHit*15;
    const alpha=0.15+waveState.amp*0.15+pct*0.08+waveState.drumHit*0.2;

    ctx.beginPath();
    ctx.strokeStyle=`hsla(${lineHue},${sat}%,${lit}%,${Math.min(alpha,0.6)})`;
    ctx.lineWidth=1.5+waveState.amp*2+waveState.drumHit*3;

    for(let x=0;x<=W;x+=3){
      const xn=x/W;
      // Multi-layer sine composition
      const f1=Math.sin(xn*waveState.freq*4+t*0.4+i*0.5)*20*(0.5+waveState.amp);
      const f2=Math.sin(xn*waveState.freq*7+t*0.7+i*0.3)*10*waveState.noteVel;
      const f3=Math.sin(xn*2+t*0.15+i*0.8)*15*bkAmp;
      const f4=Math.sin(xn*waveState.freq*12+t*1.2+i*0.2)*5*waveState.drumHit;
      // Lorenz influence
      const lorenz=Math.sin(xn*3+bkW*6+t*0.2+i*0.4)*8*bkAmp;
      // Bass pulse
      const bass=Math.sin(xn*1.5+t*0.3)*waveState.bassAmp*25;

      const y=yBase+f1+f2+f3+f4+lorenz+bass;
      if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  // Fourier spectrum as vertical glow bars at bottom
  const fourier=bkState.fourier||[];
  if(fourier.length){
    const barW=W/fourier.length;
    for(let i=0;i<fourier.length;i++){
      const v=fourier[i]||0;
      if(v<0.05)continue;
      const bH=v*drawH*0.3;
      const fHue=(waveState.hue+i*8)%360;
      ctx.fillStyle=`hsla(${fHue},70%,40%,${v*0.15})`;
      ctx.fillRect(i*barW,drawH-bH,barW-1,bH);
    }
  }
}

// ═════════════════════════════════════════════════════════════════════════════
// BACKEND STATE
// ═════════════════════════════════════════════════════════════════════════════
let bkState={oscillator:{x:0,y:0,z:0,w:0.5},fourier:new Array(32).fill(0),block:{number:0},phase:0,amplitude:0.5,tempo:0.5,tokens:[]};
const WS_URL=`ws://${location.hostname}:8765`;
let ws;(function cWS(){ws=new WebSocket(WS_URL);ws.onmessage=e=>{Object.assign(bkState,JSON.parse(e.data))};ws.onclose=()=>setTimeout(cWS,2000);ws.onerror=()=>ws.close()})();

// ═════════════════════════════════════════════════════════════════════════════
// AUDIO ENGINE
// ═════════════════════════════════════════════════════════════════════════════
let ax,masterG,dryG,wetG,reverbN,delayN,delayFb,delayG,driveN,phaserN,phaserLFO;
let audioOK=false,nextBT=0,beatN=0;

const P={bpm:110,swing:0.55,scl:'dorian',ky:0,drumsOn:true,bassOn:true,
dVol:0.6,bVol:0.55,bTone:0.4,kickV:0.8,snrV:0.65,hatV:0.5,
dStyle:'jazz',bStyle:'walk',masterV:0.75,
fxDrive:0,fxPhaser:0,fxReverb:0.4,fxDelay:0.15};

const SC={major:[0,2,4,5,7,9,11],dorian:[0,2,3,5,7,9,10],mixo:[0,2,4,5,7,9,10],minor:[0,2,3,5,7,8,10],blues:[0,3,5,6,7,10],penta:[0,2,4,7,9],tizita:[0,1,4,5,7,8,11]};
function m2f(m){return 440*Math.pow(2,(m-69)/12)}
function scN(deg,oct){const s=SC[P.scl],i=((deg%s.length)+s.length)%s.length;return P.ky+s[i]+(oct+Math.floor(deg/s.length))*12}
function nBuf(dur){const l=ax.sampleRate*dur|0,b=ax.createBuffer(1,l,ax.sampleRate),d=b.getChannelData(0);for(let i=0;i<l;i++)d[i]=Math.random()*2-1;return b}

// Reverb IR
function mkRev(){const l=ax.sampleRate*1.8|0,b=ax.createBuffer(2,l,ax.sampleRate);for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/l,2.2);}const c=ax.createConvolver();c.buffer=b;return c}

// Waveshaper for overdrive
function mkDrive(){const n=ax.createWaveShaper();const c=new Float32Array(1024);for(let i=0;i<1024;i++){const x=i*2/1024-1;c[i]=Math.tanh(x*2);}n.curve=c;n.oversample='2x';return n}

// Phaser (all-pass chain with LFO)
function mkPhaser(){
  const input=ax.createGain();input.gain.value=1;
  const output=ax.createGain();output.gain.value=1;
  const dry=ax.createGain();dry.gain.value=0.7;
  const wet=ax.createGain();wet.gain.value=0;
  const stages=[];
  for(let i=0;i<4;i++){
    const ap=ax.createBiquadFilter();ap.type='allpass';ap.frequency.value=800+i*400;ap.Q.value=0.5;
    stages.push(ap);
  }
  const lfo=ax.createOscillator();lfo.type='sine';lfo.frequency.value=0.5;
  const lfoG=ax.createGain();lfoG.gain.value=500;
  lfo.connect(lfoG);
  stages.forEach(s=>lfoG.connect(s.frequency));
  lfo.start();
  input.connect(dry).connect(output);
  let chain=input;
  stages.forEach(s=>{chain.connect(s);chain=s;});
  chain.connect(wet).connect(output);
  return{input,output,wet,lfo,stages};
}

function initAudio(){
  if(audioOK)return;audioOK=true;
  document.getElementById('start').classList.add('gone');
  ax=new(AudioContext||webkitAudioContext)();
  masterG=ax.createGain();masterG.gain.value=P.masterV;masterG.connect(ax.destination);

  // FX chain: dry → overdrive → phaser → [reverb+delay] → master
  dryG=ax.createGain();dryG.gain.value=1;
  driveN=mkDrive();
  const driveGain=ax.createGain();driveGain.gain.value=1;
  window._driveWet=ax.createGain();window._driveWet.gain.value=0;
  window._driveDry=ax.createGain();window._driveDry.gain.value=1;
  dryG.connect(window._driveDry).connect(masterG);
  dryG.connect(driveN).connect(window._driveWet).connect(masterG);

  // Actually route through phaser too
  const ph=mkPhaser();phaserN=ph;
  // Reconnect: dryG → drive/bypass → phaser → reverb/delay → master
  window._driveDry.disconnect();window._driveWet.disconnect();
  window._driveDry.connect(ph.input);window._driveWet.connect(ph.input);
  ph.output.connect(masterG);

  // Reverb
  reverbN=mkRev();
  wetG=ax.createGain();wetG.gain.value=P.fxReverb*0.5;
  ph.output.connect(reverbN);reverbN.connect(wetG);wetG.connect(masterG);

  // Delay
  delayN=ax.createDelay(1);delayN.delayTime.value=0.35;
  delayFb=ax.createGain();delayFb.gain.value=0.3;
  delayG=ax.createGain();delayG.gain.value=P.fxDelay*0.4;
  ph.output.connect(delayN);delayN.connect(delayFb);delayFb.connect(delayN);delayN.connect(delayG);delayG.connect(masterG);

  // Drone
  window._droneG=ax.createGain();window._droneG.gain.value=0.02;window._droneG.connect(dryG);
  const d1=ax.createOscillator();d1.type='sine';d1.frequency.value=m2f(P.ky+36);d1.connect(window._droneG);d1.start();window._d1=d1;
  const d2=ax.createOscillator();d2.type='triangle';d2.frequency.value=m2f(P.ky+43);const dg=ax.createGain();dg.gain.value=0.4;d2.connect(dg).connect(window._droneG);d2.start();window._d2=d2;

  nextBT=ax.currentTime+0.1;schedLoop();buildKB();
}

// ── Drums ──
const DP={
jazz:{len:16,h:[[0,'ride',.7],[2,'ride',.5],[3,'ride',.3],[4,'ride',.7],[6,'ride',.5],[7,'ride',.3],[8,'ride',.7],[10,'ride',.5],[11,'ride',.3],[12,'ride',.7],[14,'ride',.5],[15,'ride',.3],[4,'hhf',.3],[12,'hhf',.3],[0,'kick',.8],[10,'kick',.5],[4,'snare',.65],[7,'sng',.2],[12,'snare',.6],[15,'sng',.2]]},
thai:{len:16,h:[[0,'klong',1],[0,'cho',.5],[2,'chc',.4],[4,'klong',.7],[4,'cho',.5],[6,'chc',.4],[7,'ranat',.4],[8,'klong',.9],[8,'cho',.5],[10,'chc',.4],[11,'ranat',.4],[12,'klong',.8],[12,'cho',.5],[14,'chc',.45],[15,'ranat',.4]]},
ethio:{len:12,h:[[0,'kebL',1],[0,'shk',.3],[2,'shk',.3],[3,'kebH',.55],[4,'shk',.35],[5,'kebH',.45],[6,'kebL',.85],[8,'shk',.3],[9,'kebH',.6],[10,'shk',.35],[11,'kebH',.4]]}};

function sD(t,tp,vel){
  let cm=1;
  if(tp==='kick'||tp==='klong'||tp==='kebL')cm=P.kickV;
  else if(tp==='snare'||tp==='sng')cm=P.snrV;
  else cm=P.hatV;
  const v=vel*P.dVol*cm*0.35;if(v<0.001)return;
  const d=dryG;
  switch(tp){
  case'ride':{const o=ax.createOscillator(),g=ax.createGain();o.type='triangle';o.frequency.value=800+Math.random()*100;g.gain.setValueAtTime(v*.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);const f=ax.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;f.Q.value=4;o.connect(f).connect(g).connect(d);o.start(t);o.stop(t+.55);break}
  case'hhf':{const n=ax.createBufferSource();n.buffer=nBuf(.04);const g=ax.createGain(),f=ax.createBiquadFilter();f.type='highpass';f.frequency.value=8000;g.gain.setValueAtTime(v*.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);n.connect(f).connect(g).connect(d);n.start(t);n.stop(t+.06);break}
  case'kick':{const o=ax.createOscillator(),g=ax.createGain();o.type='sine';o.frequency.setValueAtTime(88,t);o.frequency.exponentialRampToValueAtTime(38,t+.2);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);o.connect(g).connect(d);o.start(t);o.stop(t+.4);hit(t,vel);break}
  case'snare':{const o=ax.createOscillator(),g=ax.createGain();o.type='triangle';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(120,t+.08);g.gain.setValueAtTime(v*.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.connect(g).connect(d);o.start(t);o.stop(t+.2);const n=ax.createBufferSource();n.buffer=nBuf(.1);const ng=ax.createGain(),nf=ax.createBiquadFilter();nf.type='highpass';nf.frequency.value=2000;ng.gain.setValueAtTime(v*.35,t);ng.gain.exponentialRampToValueAtTime(.001,t+.12);n.connect(nf).connect(ng).connect(d);n.start(t);n.stop(t+.15);hit(t,vel*.5);break}
  case'sng':{const n=ax.createBufferSource();n.buffer=nBuf(.04);const g=ax.createGain(),f=ax.createBiquadFilter();f.type='highpass';f.frequency.value=3000;g.gain.setValueAtTime(v*.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);n.connect(f).connect(g).connect(d);n.start(t);n.stop(t+.06);break}
  case'klong':{const o=ax.createOscillator(),g=ax.createGain();o.type='sine';o.frequency.setValueAtTime(88,t);o.frequency.exponentialRampToValueAtTime(36,t+.3);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);o.connect(g).connect(d);o.start(t);o.stop(t+.5);hit(t,vel);break}
  case'cho':{const o=ax.createOscillator(),g=ax.createGain();o.type='square';o.frequency.value=1800;g.gain.setValueAtTime(v*.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);const f=ax.createBiquadFilter();f.type='bandpass';f.frequency.value=2200;f.Q.value=12;o.connect(f).connect(g).connect(d);o.start(t);o.stop(t+.4);break}
  case'chc':{const o=ax.createOscillator(),g=ax.createGain();o.type='square';o.frequency.value=1600;g.gain.setValueAtTime(v*.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);const f=ax.createBiquadFilter();f.type='bandpass';f.frequency.value=2000;f.Q.value=10;o.connect(f).connect(g).connect(d);o.start(t);o.stop(t+.06);break}
  case'ranat':{const sc=SC[P.scl],deg=Math.floor((bkState.oscillator?.w||.5)*sc.length),freq=m2f(scN(deg,5));const o=ax.createOscillator(),g=ax.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(v*.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.connect(g).connect(d);o.start(t);o.stop(t+.25);break}
  case'kebL':{const o=ax.createOscillator(),g=ax.createGain();o.type='sine';o.frequency.setValueAtTime(76,t);o.frequency.exponentialRampToValueAtTime(32,t+.35);g.gain.setValueAtTime(v*1.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.connect(g).connect(d);o.start(t);o.stop(t+.55);hit(t,vel);break}
  case'kebH':{const o=ax.createOscillator(),g=ax.createGain();o.type='triangle';o.frequency.setValueAtTime(190,t);o.frequency.exponentialRampToValueAtTime(90,t+.1);g.gain.setValueAtTime(v*.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.connect(g).connect(d);o.start(t);o.stop(t+.18);break}
  case'shk':{const n=ax.createBufferSource();n.buffer=nBuf(.05);const g=ax.createGain(),f=ax.createBiquadFilter();f.type='highpass';f.frequency.value=5000;g.gain.setValueAtTime(v*.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);n.connect(f).connect(g).connect(d);n.start(t);n.stop(t+.07);break}
  }
}
function hit(t,v){const dl=Math.max(0,(t-ax.currentTime)*1000);setTimeout(()=>{waveState.drumHit=Math.max(waveState.drumHit,v)},dl)}

// ── Bass ──
let bassI=0;
function sBass(t,midi,dur){if(!P.bassOn)return;const freq=m2f(midi),v=P.bVol*.3;
const o=ax.createOscillator(),g=ax.createGain();o.type='sine';o.frequency.value=freq;
g.gain.setValueAtTime(v,t);g.gain.setValueAtTime(v*.8,t+dur*.6);g.gain.exponentialRampToValueAtTime(.001,t+dur*.95);
const f=ax.createBiquadFilter();f.type='lowpass';f.frequency.value=400+P.bTone*600;
o.connect(f).connect(g).connect(dryG);o.start(t);o.stop(t+dur);
// Trigger visual
const dl=Math.max(0,(t-ax.currentTime)*1000);setTimeout(()=>{waveState.bassAmp=Math.max(waveState.bassAmp,0.6)},dl);
}
function gBN(beat){const sc=SC[P.scl],bo=36;
if(P.bStyle==='root')return P.ky+sc[0]+bo;
if(P.bStyle==='fifth'){const fi=sc.indexOf(7)>=0?sc.indexOf(7):3;return P.ky+sc[beat%2===0?0:fi%sc.length]+bo;}
const deg=bassI%sc.length;let n=P.ky+sc[deg]+bo;bassI++;
if(Math.random()<.2){const nd=(deg+1)%sc.length;n=P.ky+sc[nd]+bo-1;}return n;}

// ── Organ ──
const orgN=new Map();
function playO(midi){if(!ax||!audioOK||orgN.has(midi))return;
const freq=m2f(midi),v=0.06;
const harms=[.5,1,2,3,4],gains=[.6,1,.7,.3,.2],oscs=[];
const ng=ax.createGain();ng.gain.setValueAtTime(0,ax.currentTime);ng.gain.linearRampToValueAtTime(v,ax.currentTime+.012);
const lfo=ax.createOscillator();lfo.type='sine';lfo.frequency.value=5.5;const lfog=ax.createGain();lfog.gain.value=3;lfo.connect(lfog);lfo.start();
for(let i=0;i<harms.length;i++){const o=ax.createOscillator();o.type='sine';o.frequency.value=freq*harms[i];lfog.connect(o.frequency);const g=ax.createGain();g.gain.value=gains[i];o.connect(g).connect(ng);o.start();oscs.push(o);}
ng.connect(dryG);orgN.set(midi,{oscs,g:ng,lfo});
// Visual: map note to hue + amplitude
const noteInOct=(midi-P.ky)%12;
waveState.targetHue=(noteInOct/12)*360;
waveState.targetAmp=Math.min(1,waveState.targetAmp+0.3);
waveState.targetFreq=0.5+noteInOct*0.3;
waveState.noteVel=Math.min(1,waveState.noteVel+0.4);
}
function stopO(midi){if(!orgN.has(midi))return;const n=orgN.get(midi),now=ax.currentTime;
n.g.gain.cancelScheduledValues(now);n.g.gain.setValueAtTime(n.g.gain.value,now);n.g.gain.exponentialRampToValueAtTime(.001,now+.1);
setTimeout(()=>{n.oscs.forEach(o=>o.stop());n.lfo.stop()},120);orgN.delete(midi);
if(orgN.size===0){waveState.targetAmp=0;waveState.targetFreq=1;}
}

// ── DUB SIREN ──
let sirenOsc,sirenGain,sirenLFO,sirenOn=false;
function startSiren(){
  if(!ax||sirenOn)return;sirenOn=true;
  sirenOsc=ax.createOscillator();sirenOsc.type='sawtooth';sirenOsc.frequency.value=600;
  sirenGain=ax.createGain();sirenGain.gain.value=0.15;
  sirenLFO=ax.createOscillator();sirenLFO.type='sine';sirenLFO.frequency.value=4;
  const lfoG=ax.createGain();lfoG.gain.value=400;
  sirenLFO.connect(lfoG).connect(sirenOsc.frequency);
  sirenOsc.connect(sirenGain).connect(dryG);
  sirenOsc.start();sirenLFO.start();
  document.getElementById('bsiren').classList.add('on');
  // Visual punch
  waveState.targetHue=30;waveState.targetAmp=0.8;waveState.noteVel=0.8;
}
function stopSiren(){
  if(!sirenOn)return;sirenOn=false;
  sirenGain.gain.exponentialRampToValueAtTime(0.001,ax.currentTime+0.1);
  setTimeout(()=>{sirenOsc.stop();sirenLFO.stop()},120);
  document.getElementById('bsiren').classList.remove('on');
  waveState.targetAmp=orgN.size>0?0.5:0;
}

// ── Keyboard ──
const WK='zxcvbnm,./'.split(''),BM={s:1,d:3,g:6,h:8,j:10,l:13};
const WS=[0,2,4,5,7,9,11,12,14,16];
function k2m(k){const kl=k.toLowerCase();const wi=WK.indexOf(kl);if(wi>=0)return P.ky+60+WS[wi];if(BM[kl]!==undefined)return P.ky+60+BM[kl];return null}
function buildKB(){
  const kb=document.getElementById('kb');kb.innerHTML='';
  [{w:1,s:0,k:'Z'},{w:0,s:1,k:'S'},{w:1,s:2,k:'X'},{w:0,s:3,k:'D'},{w:1,s:4,k:'C'},
   {w:1,s:5,k:'V'},{w:0,s:6,k:'G'},{w:1,s:7,k:'B'},{w:0,s:8,k:'H'},{w:1,s:9,k:'N'},
   {w:0,s:10,k:'J'},{w:1,s:11,k:'M'},{w:1,s:12,k:','},{w:0,s:13,k:'L'},{w:1,s:14,k:'.'},
   {w:0,s:15,k:';'},{w:1,s:16,k:'/'}].forEach(n=>{
    const el=document.createElement('div'),midi=P.ky+60+n.s;
    el.className='ky '+(n.w?'w':'b');el.dataset.midi=midi;el.textContent=n.k;
    el.addEventListener('mousedown',e=>{e.preventDefault();playO(midi);el.classList.add('a')});
    el.addEventListener('mouseup',()=>{stopO(midi);el.classList.remove('a')});
    el.addEventListener('mouseleave',()=>{stopO(midi);el.classList.remove('a')});
    el.addEventListener('touchstart',e=>{e.preventDefault();playO(midi);el.classList.add('a')},{passive:false});
    el.addEventListener('touchend',()=>{stopO(midi);el.classList.remove('a')});
    kb.appendChild(el);});
}
const held=new Set();
document.addEventListener('keydown',e=>{if(e.repeat||!audioOK||e.target.tagName==='SELECT'||e.target.tagName==='INPUT')return;
const m=k2m(e.key);if(m===null)return;e.preventDefault();if(!held.has(e.key.toLowerCase())){held.add(e.key.toLowerCase());playO(m);
const el=document.querySelector(`.ky[data-midi="${m}"]`);if(el)el.classList.add('a');}});
document.addEventListener('keyup',e=>{const m=k2m(e.key);if(m===null)return;held.delete(e.key.toLowerCase());stopO(m);
const el=document.querySelector(`.ky[data-midi="${m}"]`);if(el)el.classList.remove('a');});

// ── Mic ──
let micStr,micSrc,micGN,micLoEQ,micHiEQ,micAn,micOk=false;
async function startMic(){try{
  micStr=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
  micSrc=ax.createMediaStreamSource(micStr);
  micGN=ax.createGain();micGN.gain.value=1;
  micLoEQ=ax.createBiquadFilter();micLoEQ.type='lowshelf';micLoEQ.frequency.value=300;micLoEQ.gain.value=0;
  micHiEQ=ax.createBiquadFilter();micHiEQ.type='highshelf';micHiEQ.frequency.value=3000;micHiEQ.gain.value=0;
  micAn=ax.createAnalyser();micAn.fftSize=256;
  micSrc.connect(micGN).connect(micLoEQ).connect(micHiEQ).connect(micAn).connect(dryG);
  micOk=true;document.getElementById('bmic').classList.add('on');
}catch(e){console.warn('Mic:',e)}}
function stopMic(){if(micStr){micStr.getTracks().forEach(t=>t.stop());micSrc.disconnect();}micOk=false;document.getElementById('bmic').classList.remove('on')}
function updMic(){if(!micOk||!micAn)return;const d=new Uint8Array(micAn.frequencyBinCount);micAn.getByteFrequencyData(d);let s=0;for(let i=0;i<d.length;i++)s+=d[i];document.getElementById('mf').style.width=(s/d.length/255*100)+'%'}

// ── Recording ──
let mRec,rChunks=[],isRec=false;
function startRec(){const dest=ax.createMediaStreamDestination();masterG.connect(dest);
mRec=new MediaRecorder(dest.stream,{mimeType:'audio/webm'});rChunks=[];
mRec.ondataavailable=e=>{if(e.data.size>0)rChunks.push(e.data)};mRec.onstop=()=>{document.getElementById('bdl').style.display='inline-block'};
mRec.start();isRec=true;document.getElementById('brec').classList.add('on')}
function stopRec(){if(mRec&&mRec.state==='recording')mRec.stop();isRec=false;document.getElementById('brec').classList.remove('on')}
function dlRec(){if(!rChunks.length)return;const b=new Blob(rChunks,{type:'audio/webm'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='oscillator-'+Date.now()+'.webm';a.click();URL.revokeObjectURL(u)}

// ── Scheduler ──
function schedLoop(){if(!ax)return;
const pat=DP[P.dStyle],pl=pat.len,six=(60/P.bpm)/4,qtr=six*4;
while(nextBT<ax.currentTime+.25){
  if(P.drumsOn)for(const[off,tp,vel]of pat.h){let t=nextBT+off*six;if(off%2===1)t+=six*P.swing*.45;t+=(Math.random()-.5)*.006;sD(t,tp,vel)}
  if(P.bassOn)for(let q=0;q<pl/4;q++)sBass(nextBT+q*qtr,gBN(beatN+q),qtr*.9);
  beatN+=pl/4;nextBT+=pl*six;}
setTimeout(schedLoop,100)}

// ── Controls ──
let tapTs=[];
const C={
  bpm(v){P.bpm=v;document.getElementById('bv').textContent=v},
  tap(){const n=performance.now();tapTs.push(n);tapTs=tapTs.filter(t=>n-t<3000);if(tapTs.length>=3){let s=0;for(let i=1;i<tapTs.length;i++)s+=tapTs[i]-tapTs[i-1];const b=Math.round(60000/(s/(tapTs.length-1)));if(b>=50&&b<=180){P.bpm=b;document.getElementById('sl-bpm').value=b;document.getElementById('bv').textContent=b}}},
  scale(v){P.scl=v;buildKB()},
  key(v){P.ky=v;buildKB();if(window._d1){window._d1.frequency.setTargetAtTime(m2f(v+36),ax.currentTime,.3);window._d2.frequency.setTargetAtTime(m2f(v+43),ax.currentTime,.3)}},
  master(v){P.masterV=v/100;if(masterG)masterG.gain.setTargetAtTime(P.masterV,ax.currentTime,.1)},
  togD(){P.drumsOn=!P.drumsOn;const b=document.getElementById('bd');b.classList.toggle('on',P.drumsOn);b.textContent=P.drumsOn?'ON':'OFF'},
  togB(){P.bassOn=!P.bassOn;const b=document.getElementById('bb');b.classList.toggle('on',P.bassOn);b.textContent=P.bassOn?'ON':'OFF'},
  ds(s){P.dStyle=s;document.querySelectorAll('[data-ds]').forEach(b=>b.classList.toggle('on',b.dataset.ds===s))},
  bs(s){P.bStyle=s;document.querySelectorAll('[data-bs]').forEach(b=>b.classList.toggle('on',b.dataset.bs===s))},
  fx(type,v){const n=v/100;
    if(type==='drive'){P.fxDrive=n;if(window._driveWet){window._driveWet.gain.setTargetAtTime(n,ax.currentTime,.05);window._driveDry.gain.setTargetAtTime(1-n*.5,ax.currentTime,.05);
    // Update curve intensity
    const c=new Float32Array(1024);const amt=1+n*20;for(let i=0;i<1024;i++){const x=i*2/1024-1;c[i]=Math.tanh(x*amt);}driveN.curve=c;}}
    if(type==='phaser'){P.fxPhaser=n;if(phaserN)phaserN.wet.gain.setTargetAtTime(n,ax.currentTime,.05)}
    if(type==='reverb'){P.fxReverb=n;if(wetG)wetG.gain.setTargetAtTime(n*.5,ax.currentTime,.1)}
    if(type==='delay'){P.fxDelay=n;if(delayG)delayG.gain.setTargetAtTime(n*.4,ax.currentTime,.1)}
  },
  sirenOn(){startSiren()},sirenOff(){stopSiren()},
  mic(){micOk?stopMic():startMic()},
  micG(v){if(micGN)micGN.gain.setTargetAtTime(v/100,ax.currentTime,.1)},
  micEQ(b,v){if(b==='lo'&&micLoEQ)micLoEQ.gain.value=v;if(b==='hi'&&micHiEQ)micHiEQ.gain.value=v},
  rec(){isRec?stopRec():startRec()},
  dl(){dlRec()},
};
window.C=C;

function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
function togglePanel(){document.getElementById('panel').classList.toggle('hidden');document.getElementById('tog-btn').textContent=document.getElementById('panel').classList.contains('hidden')?'\u25B2':'\u25BC'}
window.toggleFS=toggleFS;window.togglePanel=togglePanel;window.initAudio=initAudio;

// ═════════════════════════════════════════════════════════════════════════════
// RENDER LOOP
// ═════════════════════════════════════════════════════════════════════════════
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const t=ts*0.001;
  drawWaves(t);
  updMic();
  // Update drone with backend
  if(audioOK&&window._droneG){
    const bF=m2f(P.ky+36)+(bkState.oscillator?.w||0.5)*10;
    window._d1.frequency.setTargetAtTime(bF,ax.currentTime,.5);
    window._d2.frequency.setTargetAtTime(bF*1.5,ax.currentTime,.5);
  }
}
requestAnimationFrame(loop);
</script>
