<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Oscillator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;user-select:none}
canvas{display:block}
#audio-prompt{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.8);color:rgba(255,200,120,0.9);
  padding:24px 48px;border-radius:50px;font-size:16px;letter-spacing:3px;
  cursor:pointer;z-index:30;border:1px solid rgba(255,160,60,0.3);
  transition:opacity 1s ease;text-transform:uppercase;
}
#audio-prompt.hidden{opacity:0;pointer-events:none}
/* ── Live Performance UI ── */
#perf-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:15;
  background:rgba(0,0,0,0.75);border-top:1px solid rgba(255,160,60,0.15);
  display:flex;flex-direction:column;gap:0;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#transport{
  display:flex;align-items:center;gap:12px;padding:6px 16px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
#sections{display:flex;gap:0;padding:0}
.section{
  flex:1;display:flex;flex-direction:column;gap:6px;padding:8px 12px;
  border-right:1px solid rgba(255,255,255,0.05);
}
.section:last-child{border-right:none}
.sec-title{
  color:rgba(255,180,80,0.6);font-size:9px;letter-spacing:2px;
  text-transform:uppercase;text-align:center;
}
.ctrl-row{display:flex;gap:6px;align-items:center;justify-content:center}
.sl{
  -webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:3px;
  background:rgba(255,255,255,0.08);outline:none;cursor:pointer;
}
.sl::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,180,80,0.9),rgba(180,80,20,0.6));
  border:1px solid rgba(255,200,120,0.3);cursor:pointer;
}
.lbl{color:rgba(200,170,130,0.6);font-size:9px;min-width:35px;text-align:right;letter-spacing:1px}
.btn{
  background:rgba(255,255,255,0.05);color:rgba(200,170,130,0.7);
  border:1px solid rgba(255,160,60,0.15);border-radius:14px;
  padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;
  transition:all 0.2s;letter-spacing:1px;
}
.btn:hover{background:rgba(255,160,60,0.12)}
.btn.on{background:rgba(255,120,30,0.25);border-color:rgba(255,160,60,0.5);color:rgba(255,220,160,0.95)}
.btn.accent{background:rgba(80,200,120,0.15);border-color:rgba(80,200,120,0.3);color:rgba(150,255,180,0.8)}
.btn.accent.on{background:rgba(80,200,120,0.3);color:rgba(200,255,220,0.95)}
#bpm-val{color:rgba(255,180,80,0.7);font-size:11px;min-width:50px;text-align:center;font-weight:bold}
/* ── Keyboard ── */
#keyboard{
  display:flex;height:50px;position:relative;justify-content:center;padding:2px 0;
}
.key{
  width:32px;height:46px;border-radius:0 0 4px 4px;cursor:pointer;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;
  font-size:8px;transition:background 0.1s;position:relative;
}
.key.white{
  background:linear-gradient(180deg,rgba(220,210,200,0.9),rgba(200,190,180,0.85));
  border:1px solid rgba(100,80,60,0.3);color:rgba(80,60,40,0.5);
  margin:0 1px;z-index:1;
}
.key.white:hover,.key.white.active{background:linear-gradient(180deg,rgba(255,220,150,0.95),rgba(255,200,120,0.9))}
.key.black{
  background:linear-gradient(180deg,rgba(40,30,20,0.95),rgba(20,15,10,0.9));
  border:1px solid rgba(80,60,40,0.4);color:rgba(180,150,120,0.4);
  width:22px;height:30px;margin:0 -11px;z-index:2;
}
.key.black:hover,.key.black.active{background:linear-gradient(180deg,rgba(80,50,20,0.95),rgba(60,35,10,0.9))}
select.scale-sel{
  background:rgba(0,0,0,0.4);color:rgba(200,170,130,0.8);
  border:1px solid rgba(255,160,60,0.2);border-radius:10px;
  padding:2px 6px;font-size:9px;font-family:inherit;cursor:pointer;outline:none;
}
</style>
</head>
<body>
<div id="audio-prompt">click to begin</div>

<div id="perf-panel">
  <!-- Transport bar -->
  <div id="transport">
    <span class="lbl">BPM</span>
    <input type="range" class="sl" style="width:100px" id="sl-bpm" min="50" max="180" value="110" oninput="setBPM(+this.value)">
    <span id="bpm-val">110</span>
    <button class="btn" id="btn-tap" onclick="tapTempo()">TAP</button>
    <span style="flex:1"></span>
    <span class="lbl">SCALE</span>
    <select class="scale-sel" id="sel-scale" onchange="setScale(this.value)">
      <option value="major">Major (Ionian)</option>
      <option value="dorian" selected>Dorian</option>
      <option value="mixo">Mixolydian</option>
      <option value="minor">Minor (Aeolian)</option>
      <option value="blues">Blues</option>
      <option value="penta">Pentatonic</option>
      <option value="tizita">Tizita (Ethiopian)</option>
      <option value="thai">Thai Pentatonic</option>
    </select>
    <span class="lbl">KEY</span>
    <select class="scale-sel" id="sel-key" onchange="setKey(+this.value)">
      <option value="0">C</option><option value="1">Db</option><option value="2">D</option>
      <option value="3">Eb</option><option value="4">E</option><option value="5">F</option>
      <option value="6">Gb</option><option value="7">G</option><option value="8">Ab</option>
      <option value="9">A</option><option value="10">Bb</option><option value="11">B</option>
    </select>
    <span style="flex:1"></span>
    <span class="lbl">MASTER</span>
    <input type="range" class="sl" style="width:60px" min="0" max="100" value="75" oninput="setMaster(+this.value)">
  </div>

  <!-- Sections -->
  <div id="sections">
    <!-- Drums -->
    <div class="section">
      <div class="sec-title">drums</div>
      <div class="ctrl-row">
        <button class="btn on" id="btn-drums" onclick="toggleDrums()">ON</button>
        <button class="btn on" data-ds="jazz" onclick="setDrumStyle('jazz')">Jazz</button>
        <button class="btn" data-ds="thai" onclick="setDrumStyle('thai')">Thai</button>
        <button class="btn" data-ds="ethio" onclick="setDrumStyle('ethio')">Ethio</button>
      </div>
      <div class="ctrl-row">
        <span class="lbl">SWING</span>
        <input type="range" class="sl" min="0" max="100" value="55" oninput="setSwing(+this.value)">
        <span class="lbl">VOL</span>
        <input type="range" class="sl" style="width:50px" min="0" max="100" value="60" oninput="setDrumVol(+this.value)">
      </div>
    </div>
    <!-- Bass -->
    <div class="section">
      <div class="sec-title">bass</div>
      <div class="ctrl-row">
        <button class="btn on" id="btn-bass" onclick="toggleBass()">ON</button>
        <button class="btn on" data-bs="walk" onclick="setBassStyle('walk')">Walk</button>
        <button class="btn" data-bs="root" onclick="setBassStyle('root')">Root</button>
        <button class="btn" data-bs="octave" onclick="setBassStyle('octave')">Octave</button>
      </div>
      <div class="ctrl-row">
        <span class="lbl">VOL</span>
        <input type="range" class="sl" min="0" max="100" value="55" oninput="setBassVol(+this.value)">
        <span class="lbl">TONE</span>
        <input type="range" class="sl" style="width:50px" min="0" max="100" value="40" oninput="setBassTone(+this.value)">
      </div>
    </div>
    <!-- Organ Keyboard -->
    <div class="section" style="flex:2">
      <div class="sec-title">organ</div>
      <div id="keyboard"></div>
    </div>
    <!-- Drone / FX -->
    <div class="section">
      <div class="sec-title">drone/fx</div>
      <div class="ctrl-row">
        <button class="btn on" id="btn-drone" onclick="toggleDrone()">ON</button>
        <span class="lbl">LVL</span>
        <input type="range" class="sl" min="0" max="100" value="35" oninput="setDroneLvl(+this.value)">
      </div>
      <div class="ctrl-row">
        <span class="lbl">VERB</span>
        <input type="range" class="sl" min="0" max="100" value="50" oninput="setReverb(+this.value)">
      </div>
    </div>
  </div>
</div>

<script src="three.min.js"></script>
<script src="pp/CopyShader.js"></script>
<script src="pp/LuminosityHighPassShader.js"></script>
<script src="pp/EffectComposer.js"></script>
<script src="pp/RenderPass.js"></script>
<script src="pp/ShaderPass.js"></script>
<script src="pp/UnrealBloomPass.js"></script>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// BACKEND STATE
// ═════════════════════════════════════════════════════════════════════════════
const WS_URL=`ws://${location.hostname}:8765`;
let S={oscillator:{x:0,y:0,z:0,w:0.5},fourier:new Array(32).fill(0),block:{number:0,time_variance:0.1},phase:0,amplitude:0.5,tempo:0.5,sine_mix:0,tokens:[]};
let ST=JSON.parse(JSON.stringify(S));
const LERP=0.07;
function lerpV(a,b,t){return a+(b-a)*t}
function lerpState(){
  S.oscillator.x=lerpV(S.oscillator.x,ST.oscillator.x,LERP);S.oscillator.y=lerpV(S.oscillator.y,ST.oscillator.y,LERP);
  S.oscillator.z=lerpV(S.oscillator.z,ST.oscillator.z,LERP);S.oscillator.w=lerpV(S.oscillator.w,ST.oscillator.w,LERP);
  S.phase=lerpV(S.phase,ST.phase,LERP);S.amplitude=lerpV(S.amplitude,ST.amplitude,LERP);
  S.tempo=lerpV(S.tempo,ST.tempo,LERP);S.sine_mix=lerpV(S.sine_mix,ST.sine_mix,LERP);
  S.block.time_variance=lerpV(S.block.time_variance,ST.block.time_variance,LERP);
  for(let i=0;i<32;i++)S.fourier[i]=lerpV(S.fourier[i]||0,ST.fourier[i]||0,LERP);
}
let drumImpact=0;
let ws;
function connectWS(){
  ws=new WebSocket(WS_URL);
  ws.onmessage=e=>{const d=JSON.parse(e.data);ST.oscillator=d.oscillator;ST.fourier=d.fourier;ST.block=d.block;ST.phase=d.phase;ST.amplitude=d.amplitude;ST.tempo=d.tempo;ST.sine_mix=d.sine_mix||0;ST.tokens=d.tokens||[];};
  ws.onclose=()=>setTimeout(connectWS,2000);ws.onerror=()=>ws.close();
}
connectWS();

// ═════════════════════════════════════════════════════════════════════════════
// THREE.JS — SOLAR SYSTEM + DRAGONS
// ═════════════════════════════════════════════════════════════════════════════
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.toneMapping=THREE.ReinhardToneMapping;renderer.toneMappingExposure=1.8;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020206);
const camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,800);
camera.position.set(0,40,90);
const composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
const bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),1.5,0.8,0.15);
composer.addPass(bloomPass);

// Stars
const SN=6000,sGeo=new THREE.BufferGeometry(),sP=new Float32Array(SN*3),sC=new Float32Array(SN*3);
for(let i=0;i<SN;i++){const r=200+Math.random()*300,th=Math.random()*6.283,ph=Math.acos(2*Math.random()-1);
sP[i*3]=r*Math.sin(ph)*Math.cos(th);sP[i*3+1]=r*Math.sin(ph)*Math.sin(th);sP[i*3+2]=r*Math.cos(ph);
const t=0.5+Math.random()*0.5;sC[i*3]=0.7+t*0.3;sC[i*3+1]=0.7+t*0.2;sC[i*3+2]=0.8+t*0.2;}
sGeo.setAttribute('position',new THREE.BufferAttribute(sP,3));
sGeo.setAttribute('color',new THREE.BufferAttribute(sC,3));
scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({size:0.7,vertexColors:true,transparent:true,opacity:0.6})));

// Sun
const sunMat=new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uW:{value:0.5},uImpact:{value:0}},
  vertexShader:`varying vec3 vN;varying vec2 vU;void main(){vN=normalize(normalMatrix*normal);vU=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform float uTime,uW,uImpact;varying vec3 vN;varying vec2 vU;
  vec3 hsl(float h,float s,float l){float c=(1.0-abs(2.0*l-1.0))*s;float x=c*(1.0-abs(mod(h*6.0,2.0)-1.0));float m=l-c*0.5;vec3 r;float hh=h*6.0;if(hh<1.0)r=vec3(c,x,0);else if(hh<2.0)r=vec3(x,c,0);else if(hh<3.0)r=vec3(0,c,x);else if(hh<4.0)r=vec3(0,x,c);else if(hh<5.0)r=vec3(x,0,c);else r=vec3(c,0,x);return r+m;}
  void main(){float p=0.7+sin(uTime*1.5)*0.15+uImpact*0.4;float f=pow(1.0-abs(dot(vN,vec3(0,0,1))),2.0);float n=sin(vU.x*30.0+uTime*2.0)*sin(vU.y*25.0+uTime*1.5)*0.15;float h=mod(uW*0.8+0.08+n*0.1,1.0);vec3 co=hsl(h,0.9,0.6)*p;vec3 cr=hsl(mod(h+0.05,1.0),1.0,0.7)*f*1.5;gl_FragColor=vec4(co+cr+n*0.3,1.0);}`,
});
const sun=new THREE.Mesh(new THREE.SphereGeometry(5,48,48),sunMat);scene.add(sun);
// Sun glow
const gc=document.createElement('canvas');gc.width=gc.height=256;const gx=gc.getContext('2d');
const gr=gx.createRadialGradient(128,128,0,128,128,128);
gr.addColorStop(0,'rgba(255,200,80,0.4)');gr.addColorStop(0.3,'rgba(255,140,40,0.15)');gr.addColorStop(1,'rgba(255,80,0,0)');
gx.fillStyle=gr;gx.fillRect(0,0,256,256);
const sunGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(gc),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
sunGlow.scale.set(30,30,1);scene.add(sunGlow);

// Planets
const PCFG=[
  {name:'ETH',r:1.8,o:14,spd:0.3,h:0.6,ring:1},{name:'BTC',r:2.5,o:22,spd:0.15,h:0.1,ring:0},
  {name:'SOL',r:1.2,o:30,spd:0.45,h:0.45,ring:0},{name:'LINK',r:1.0,o:37,spd:0.35,h:0.65,ring:1},
  {name:'UNI',r:0.9,o:43,spd:0.5,h:0.8,ring:0},{name:'AAVE',r:1.1,o:49,spd:0.25,h:0.3,ring:0},
  {name:'ARB',r:0.7,o:55,spd:0.55,h:0.55,ring:1},{name:'OP',r:0.8,o:60,spd:0.4,h:0.0,ring:0},
];
const planets=[];
PCFG.forEach((c,idx)=>{
  const g=new THREE.Group();
  const oc=new THREE.EllipseCurve(0,0,c.o,c.o*0.92,0,Math.PI*2,false,0);
  const op=oc.getPoints(128);
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(op.map(p=>new THREE.Vector3(p.x,0,p.y))),
    new THREE.LineBasicMaterial({color:new THREE.Color().setHSL(c.h,0.3,0.12),transparent:true,opacity:0.25})));
  const pm=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(c.h,0.7,0.4),emissive:new THREE.Color().setHSL(c.h,0.8,0.15),roughness:0.6,metalness:0.3});
  const pl=new THREE.Mesh(new THREE.SphereGeometry(c.r,32,32),pm);g.add(pl);
  g.add(new THREE.Mesh(new THREE.SphereGeometry(c.r*1.25,20,20),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(c.h,0.9,0.5),transparent:true,opacity:0.1,side:THREE.BackSide})));
  if(c.ring){const rm=new THREE.Mesh(new THREE.RingGeometry(c.r*1.6,c.r*2.4,48),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(c.h,0.5,0.4),transparent:true,opacity:0.2,side:THREE.DoubleSide}));rm.rotation.x=Math.PI*0.45;g.add(rm);}
  scene.add(g);planets.push({group:g,planet:pl,cfg:c,angle:idx*Math.PI*0.25});
});
const sunLight=new THREE.PointLight(0xffeedd,2.5,200);scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x112244,0.3));

// Dust belt
const DN=8000,dGeo=new THREE.BufferGeometry(),dP=new Float32Array(DN*3),dR=new Float32Array(DN);
for(let i=0;i<DN;i++){const r=25+Math.random()*40,a=Math.random()*6.283;dP[i*3]=Math.cos(a)*r;dP[i*3+1]=(Math.random()-0.5)*4;dP[i*3+2]=Math.sin(a)*r;dR[i]=Math.random();}
dGeo.setAttribute('position',new THREE.BufferAttribute(dP,3));dGeo.setAttribute('aRand',new THREE.BufferAttribute(dR,1));
const dMat=new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uW:{value:0.5},uImpact:{value:0}},
  vertexShader:`uniform float uTime,uImpact;attribute float aRand;varying float vA,vH;
  void main(){vec3 p=position;float a=uTime*0.02*(0.5+aRand*0.5);float c=cos(a),s=sin(a);vec3 rp=vec3(p.x*c-p.z*s,p.y+sin(uTime*0.3+aRand*10.0)*0.5,p.x*s+p.z*c);rp*=1.0+uImpact*0.1;vec4 mv=modelViewMatrix*vec4(rp,1.0);gl_Position=projectionMatrix*mv;gl_PointSize=max(1.0,(1.5+aRand)*(150.0/-mv.z));vA=0.2+aRand*0.3;vH=aRand;}`,
  fragmentShader:`varying float vA,vH;uniform float uW;
  vec3 hsl(float h,float s,float l){float c=(1.0-abs(2.0*l-1.0))*s;float x=c*(1.0-abs(mod(h*6.0,2.0)-1.0));float m=l-c*0.5;vec3 r;float hh=h*6.0;if(hh<1.0)r=vec3(c,x,0);else if(hh<2.0)r=vec3(x,c,0);else if(hh<3.0)r=vec3(0,c,x);else if(hh<4.0)r=vec3(0,x,c);else if(hh<5.0)r=vec3(x,0,c);else r=vec3(c,0,x);return r+m;}
  void main(){vec2 uv=gl_PointCoord-0.5;float d=length(uv);if(d>0.5)discard;float s=exp(-d*d*10.0);vec3 c=hsl(mod(vH+uW*0.5,1.0),0.5,0.5);gl_FragColor=vec4(c*s*1.2,s*vA);}`,
  transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
scene.add(new THREE.Points(dGeo,dMat));

// ── PROCEDURAL DRAGONS ───────────────────────────────────────────────────────
const DRAGON_COUNT = 5;
const dragons = [];
const dragonMat = new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.7,side:THREE.DoubleSide});

function buildDragon(hue) {
  const group = new THREE.Group();
  const col = new THREE.Color().setHSL(hue, 0.9, 0.5);
  const glowCol = new THREE.Color().setHSL(hue, 1.0, 0.65);

  // Body: segmented tube (spine)
  const SEGS = 20;
  const bodyPts = [];
  for (let i = 0; i < SEGS; i++) bodyPts.push(new THREE.Vector3(0, 0, -i * 0.8));
  const curve = new THREE.CatmullRomCurve3(bodyPts);
  const bodyGeo = new THREE.TubeGeometry(curve, SEGS * 2, 0.35, 8, false);
  const bodyMat = new THREE.MeshStandardMaterial({color: col, emissive: glowCol, emissiveIntensity: 0.3, roughness: 0.4, metalness: 0.5});
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  group.add(body);

  // Head: cone
  const headGeo = new THREE.ConeGeometry(0.5, 1.5, 8);
  const headMat = new THREE.MeshStandardMaterial({color: col, emissive: glowCol, emissiveIntensity: 0.4, roughness: 0.3, metalness: 0.6});
  const head = new THREE.Mesh(headGeo, headMat);
  head.rotation.x = Math.PI / 2;
  head.position.z = 0.5;
  group.add(head);

  // Eyes (two small bright spheres)
  const eyeMat = new THREE.MeshBasicMaterial({color: 0xffff80});
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
  eyeL.position.set(-0.25, 0.2, 0.6);
  group.add(eyeL);
  const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), eyeMat);
  eyeR.position.set(0.25, 0.2, 0.6);
  group.add(eyeR);

  // Wings (two flat triangle shapes)
  const wingShape = new THREE.Shape();
  wingShape.moveTo(0, 0);
  wingShape.lineTo(3, 1.5);
  wingShape.lineTo(2.5, -0.5);
  wingShape.lineTo(1.5, -0.3);
  wingShape.lineTo(0, 0);
  const wingGeo = new THREE.ShapeGeometry(wingShape);
  const wingMat = new THREE.MeshStandardMaterial({color: col, emissive: glowCol, emissiveIntensity: 0.2, transparent: true, opacity: 0.6, side: THREE.DoubleSide, roughness: 0.5});

  const wingL = new THREE.Mesh(wingGeo, wingMat.clone());
  wingL.position.set(0, 0.2, -3);
  wingL.rotation.y = -0.3;
  group.add(wingL);

  const wingR = new THREE.Mesh(wingGeo, wingMat.clone());
  wingR.position.set(0, 0.2, -3);
  wingR.rotation.y = Math.PI + 0.3;

  group.scale.set(1.5, 1.5, 1.5);

  return { group, wingL, wingR, fire, body, hue };
}

for (let i = 0; i < DRAGON_COUNT; i++) {
  const hue = (i * 0.18 + 0.05) % 1;
  const d = buildDragon(hue);
  d.orbitR = 30 + i * 12;
  d.orbitSpeed = 0.06 + i * 0.015;
  d.orbitTilt = (Math.random() - 0.5) * 0.8;
  d.yAmp = 8 + Math.random() * 12;
  d.phase = i * 1.3;
  d.flapSpeed = 3 + Math.random() * 2;
  dragons.push(d);
}

function updateDragons(t) {
  for (const d of dragons) {
    const a = t * d.orbitSpeed + d.phase;
    const r = d.orbitR + Math.sin(t * 0.15 + d.phase) * 8 + drumImpact * 5;
    const x = Math.cos(a) * r;
    const z = Math.sin(a) * r * 0.9;
    const y = Math.sin(a * 1.5 + d.phase) * d.yAmp + Math.sin(t * 0.3) * 3;

    d.group.position.set(x, y, z);

    // Face direction of travel
    const nextA = a + 0.02;
    const nx = Math.cos(nextA) * r;
    const nz = Math.sin(nextA) * r * 0.9;
    d.group.lookAt(nx, y + Math.sin(t * 0.5) * 2, nz);

    // Wing flap
    const flap = Math.sin(t * d.flapSpeed) * 0.5;
    d.wingL.rotation.z = 0.2 + flap + drumImpact * 0.5;
    d.wingR.rotation.z = -(0.2 + flap + drumImpact * 0.5);

    // Fire breath pulses with drum
    d.fire.scale.setScalar(1.5 + drumImpact * 4 + Math.sin(t * 2) * 0.5);
    d.fire.material.opacity = 0.3 + drumImpact * 0.6;

    // Color shift
    const h = (d.hue + S.oscillator.w * 0.3 + t * 0.01) % 1;
    d.body.material.emissive.setHSL(h, 1.0, 0.2 + drumImpact * 0.2);
  }
}

let audioCtx, masterGain, reverbNode, dryGain, wetGain;
let audioStarted = false;
let nextBeatTime = 0;
let beatCount = 0;

// ── Performance state ──
let perfBPM = 110;
let perfSwing = 0.55;
let perfScale = 'dorian';
let perfKey = 0; // 0=C
let perfDrumsOn = true, perfBassOn = true, perfDroneOn = true;
let perfDrumVol = 0.6, perfBassVol = 0.55, perfDroneLvl = 0.35;
let perfBassTone = 0.4, perfReverbMix = 0.5, perfMasterVol = 0.75;
let perfDrumStyle = 'jazz', perfBassStyle = 'walk';

// ── Scale definitions (semitone intervals from root) ──
const SCALES = {
  major:  [0,2,4,5,7,9,11],
  dorian: [0,2,3,5,7,9,10],
  mixo:   [0,2,4,5,7,9,10],
  minor:  [0,2,3,5,7,8,10],
  blues:  [0,3,5,6,7,10],
  penta:  [0,2,4,7,9],
  tizita: [0,1,4,5,7,8,11],  // Ethiopian Tizita minor
  thai:   [0,2,5,7,10],       // Thai pentatonic approximation
};

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function getScaleNote(degree, octave) {
  const scale = SCALES[perfScale];
  const idx = ((degree % scale.length) + scale.length) % scale.length;
  const octShift = Math.floor(degree / scale.length);
  return perfKey + scale[idx] + (octave + octShift) * 12;
}

// ── Reverb (convolution-style via feedback delay) ──
function buildReverb(ctx) {
  const len = ctx.sampleRate * 1.5;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
  }
  const conv = ctx.createConvolver();
  conv.buffer = buf;
  return conv;
}

function createNoiseBuf(ctx, dur) {
  const len=Math.floor(ctx.sampleRate*dur),buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return buf;
}

      const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;f.Q.value=4;
      o.connect(f).connect(g).connect(dest);o.start(time);o.stop(time+0.55);

// ═══ WALKING BASS ════════════════════════════════════════════════════════════
let bassNoteIdx = 0;

function synthBass(ctx, time, midiNote, dur) {
  if (!perfBassOn) return;
  const freq = midiToFreq(midiNote);
  const v = perfBassVol * 0.3;

  // Upright bass: sine + triangle with filter
  const o1 = ctx.createOscillator(), g1 = ctx.createGain();
  o1.type = 'sine'; o1.frequency.value = freq;
  g1.gain.setValueAtTime(v, time);
  g1.gain.setValueAtTime(v * 0.8, time + dur * 0.6);
  g1.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.95);
  const f = ctx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 400 + perfBassTone * 600;
  o1.connect(f).connect(g1).connect(dryGain);
  o1.start(time); o1.stop(time + dur);

  // Harmonic body
  const o2 = ctx.createOscillator(), g2 = ctx.createGain();
  o2.type = 'triangle'; o2.frequency.value = freq;
  g2.gain.setValueAtTime(v * 0.3, time);
  g2.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.7);
  o2.connect(f).connect(g2).connect(dryGain);
  o2.start(time); o2.stop(time + dur);

  // Pluck transient
  const n = ctx.createBufferSource(); n.buffer = createNoiseBuf(ctx, 0.02);
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(v * 0.2, time);
  ng.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
  n.connect(ng).connect(dryGain);
  n.start(time); n.stop(time + 0.04);
}

function getWalkingBassNote(beat) {
  const sc = SCALES[perfScale];
  if (perfBassStyle === 'root') {
    return perfKey + sc[0] + 36; // Root, octave 2
  } else if (perfBassStyle === 'octave') {
    return perfKey + sc[0] + (beat % 2 === 0 ? 36 : 48);
  }
  // Walking: move through scale degrees with chromatic approaches
  const deg = bassNoteIdx % sc.length;
  let note = perfKey + sc[deg] + 36;
  bassNoteIdx++;
  // Occasional chromatic approach (approach next note from half-step below)
  if (Math.random() < 0.2) {
    const nextDeg = (deg + 1) % sc.length;
    const nextNote = perfKey + sc[nextDeg] + 36;
    note = nextNote - 1; // chromatic approach
  }
  return note;
}

// ═══ ORGAN (drawbar synthesis) ════════════════════════════════════════════════
const activeOrganNotes = new Map();
const organGain = { node: null };

function playOrganNote(midiNote) {
  if (!audioCtx || !audioStarted) return;
  if (activeOrganNotes.has(midiNote)) return;
  const freq = midiToFreq(midiNote);
  const v = 0.06;

  // Drawbar organ: harmonics at 16', 8', 4', 2-2/3', 2'
  const harmonics = [0.5, 1, 2, 3, 4];
  const gains     = [0.6, 1.0, 0.7, 0.3, 0.2];
  const oscs = [];
  const noteGain = audioCtx.createGain();
  noteGain.gain.setValueAtTime(0, audioCtx.currentTime);
  noteGain.gain.linearRampToValueAtTime(v, audioCtx.currentTime + 0.02);

  // Leslie speaker effect (slow vibrato)
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 5.5;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 3;
  lfo.connect(lfoGain);
  lfo.start();

  for (let i = 0; i < harmonics.length; i++) {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq * harmonics[i];
    lfoGain.connect(o.frequency);
    const g = audioCtx.createGain();
    g.gain.value = gains[i];
    o.connect(g).connect(noteGain);
    o.start();
    oscs.push(o);
  }

  noteGain.connect(dryGain);
  activeOrganNotes.set(midiNote, { oscs, gain: noteGain, lfo });
}

function stopOrganNote(midiNote) {
  if (!activeOrganNotes.has(midiNote)) return;
  const n = activeOrganNotes.get(midiNote);
  const now = audioCtx.currentTime;
  n.gain.gain.cancelScheduledValues(now);
  n.gain.gain.setValueAtTime(n.gain.gain.value, now);
  n.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  setTimeout(() => { n.oscs.forEach(o => o.stop()); n.lfo.stop(); }, 200);
  activeOrganNotes.delete(midiNote);
}

// ═══ KEYBOARD UI ═════════════════════════════════════════════════════════════
const KEY_MAP = { // computer keyboard → scale degree
  'a':0,'w':0.5,'s':1,'e':1.5,'d':2,'f':3,'t':3.5,'g':4,'y':4.5,'h':5,'u':5.5,'j':6,'k':7,
};

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const sc = SCALES[perfScale];
  // Build one octave of white + black keys based on chromatic layout
  const chromatic = [
    {note:'C',black:false},{note:'Db',black:true},{note:'D',black:false},
    {note:'Eb',black:true},{note:'E',black:false},{note:'F',black:false},
    {note:'Gb',black:true},{note:'G',black:false},{note:'Ab',black:true},
    {note:'A',black:false},{note:'Bb',black:true},{note:'B',black:false},
  ];
  // Plus one more C
  const fullChrom = [...chromatic, {note:'C',black:false}];
  const compKeys = 'asdfghjkl;\'';
  let wIdx = 0;
  fullChrom.forEach((k, i) => {
    const el = document.createElement('div');
    el.className = 'key ' + (k.black ? 'black' : 'white');
    const midi = perfKey + 60 + i; // Middle C octave
    el.dataset.midi = midi;
    if (!k.black) {
      el.textContent = compKeys[wIdx] || '';
      wIdx++;
    }
    el.addEventListener('mousedown', e => { e.preventDefault(); playOrganNote(midi); el.classList.add('active'); });
    el.addEventListener('mouseup', () => { stopOrganNote(midi); el.classList.remove('active'); });
    el.addEventListener('mouseleave', () => { stopOrganNote(midi); el.classList.remove('active'); });
    el.addEventListener('touchstart', e => { e.preventDefault(); playOrganNote(midi); el.classList.add('active'); });
    el.addEventListener('touchend', () => { stopOrganNote(midi); el.classList.remove('active'); });
    kb.appendChild(el);
  });
}

// Computer keyboard input
const heldKeys = new Set();
document.addEventListener('keydown', e => {
  if (e.repeat || !audioStarted) return;
  const deg = KEY_MAP[e.key.toLowerCase()];
  if (deg === undefined) return;
  e.preventDefault();
  // Map to midi
  const semi = Math.floor(deg);
  const isSharp = deg % 1 !== 0;
  const midi = perfKey + 60 + semi + (isSharp ? 1 : 0);
  if (!heldKeys.has(e.key.toLowerCase())) {
    heldKeys.add(e.key.toLowerCase());
    playOrganNote(midi);
    const el = document.querySelector(`.key[data-midi="${midi}"]`);
    if (el) el.classList.add('active');
  }
});
document.addEventListener('keyup', e => {
  const deg = KEY_MAP[e.key.toLowerCase()];
  if (deg === undefined) return;
  const semi = Math.floor(deg);
  const isSharp = deg % 1 !== 0;
  const midi = perfKey + 60 + semi + (isSharp ? 1 : 0);
  heldKeys.delete(e.key.toLowerCase());
  stopOrganNote(midi);
  const el = document.querySelector(`.key[data-midi="${midi}"]`);
  if (el) el.classList.remove('active');
});

// ═══ SCHEDULER ═══════════════════════════════════════════════════════════════
function scheduleLoop() {
  if (!audioCtx) return;
  const pat = DRUM_PATTERNS[perfDrumStyle];
  const patLen = pat.len;
  const sixteenth = (60.0 / perfBPM) / 4;
  const quarter = sixteenth * 4;

  while (nextBeatTime < audioCtx.currentTime + 0.25) {
    // Drums
    if (perfDrumsOn) {
      for (const [offset, type, vel] of pat.hits) {
        let t = nextBeatTime + offset * sixteenth;
        // Swing on odd 16ths
        if (offset % 2 === 1) t += sixteenth * perfSwing * 0.45;
        t += (Math.random() - 0.5) * 0.006; // humanize
        synthDrum(audioCtx, t, type, vel);
      }
    }

    // Bass — one note per quarter
    if (perfBassOn) {
      for (let q = 0; q < patLen / 4; q++) {
        const bTime = nextBeatTime + q * quarter;
        const note = getWalkingBassNote(beatCount + q);
        synthBass(audioCtx, bTime, note, quarter * 0.9);
      }
    }

    beatCount += patLen / 4;
    nextBeatTime += patLen * sixteenth;
  }
  setTimeout(scheduleLoop, 100);
}

function triggerImpact(time, vel) {
  const d = Math.max(0, (time - audioCtx.currentTime) * 1000);
  setTimeout(() => { drumImpact = Math.max(drumImpact, vel); }, d);
}

// Drone
let droneO1, droneO2, droneGN;

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = perfMasterVol;
  masterGain.connect(audioCtx.destination);

  // Dry/wet routing for reverb
  dryGain = audioCtx.createGain(); dryGain.gain.value = 1;
  wetGain = audioCtx.createGain(); wetGain.gain.value = perfReverbMix * 0.5;
  reverbNode = buildReverb(audioCtx);
  dryGain.connect(masterGain);
  dryGain.connect(reverbNode);
  reverbNode.connect(wetGain);
  wetGain.connect(masterGain);

  // Drone
  droneGN = audioCtx.createGain(); droneGN.gain.value = perfDroneLvl * 0.06;
  droneGN.connect(masterGain);
  droneO1 = audioCtx.createOscillator(); droneO1.type='sine'; droneO1.frequency.value=midiToFreq(perfKey+36);
  droneO1.connect(droneGN); droneO1.start();
  droneO2 = audioCtx.createOscillator(); droneO2.type='triangle'; droneO2.frequency.value=midiToFreq(perfKey+43);
  const dg2=audioCtx.createGain();dg2.gain.value=0.4;
  droneO2.connect(dg2).connect(droneGN); droneO2.start();

  nextBeatTime = audioCtx.currentTime + 0.1;
  scheduleLoop();
  buildKeyboard();
  document.getElementById('audio-prompt').classList.add('hidden');
}

document.addEventListener('click', e => {
  if (e.target.closest('#perf-panel')) return;
  startAudio();
}, {once: true});

// ═══ UI CONTROL FUNCTIONS ════════════════════════════════════════════════════
function setBPM(v) { perfBPM = v; document.getElementById('bpm-val').textContent = v; }
function setScale(v) { perfScale = v; buildKeyboard(); }
function setKey(v) { perfKey = v; buildKeyboard(); if (droneO1) { droneO1.frequency.setTargetAtTime(midiToFreq(v+36),audioCtx.currentTime,0.3); droneO2.frequency.setTargetAtTime(midiToFreq(v+43),audioCtx.currentTime,0.3); }}
function setMaster(v) { perfMasterVol = v/100; if(masterGain) masterGain.gain.setTargetAtTime(perfMasterVol,audioCtx.currentTime,0.1); }
function toggleDrums() { perfDrumsOn=!perfDrumsOn; document.getElementById('btn-drums').classList.toggle('on',perfDrumsOn); document.getElementById('btn-drums').textContent=perfDrumsOn?'ON':'OFF'; }
function toggleBass() { perfBassOn=!perfBassOn; document.getElementById('btn-bass').classList.toggle('on',perfBassOn); document.getElementById('btn-bass').textContent=perfBassOn?'ON':'OFF'; }
function toggleDrone() { perfDroneOn=!perfDroneOn; document.getElementById('btn-drone').classList.toggle('on',perfDroneOn); document.getElementById('btn-drone').textContent=perfDroneOn?'ON':'OFF'; if(droneGN) droneGN.gain.setTargetAtTime(perfDroneOn?perfDroneLvl*0.06:0,audioCtx.currentTime,0.2); }
function setSwing(v) { perfSwing = v/100; }
function setDrumVol(v) { perfDrumVol = v/100; }
function setBassVol(v) { perfBassVol = v/100; }
function setBassTone(v) { perfBassTone = v/100; }
function setDroneLvl(v) { perfDroneLvl=v/100; if(droneGN&&perfDroneOn) droneGN.gain.setTargetAtTime(perfDroneLvl*0.06,audioCtx.currentTime,0.2); }
function setReverb(v) { perfReverbMix=v/100; if(wetGain) wetGain.gain.setTargetAtTime(perfReverbMix*0.5,audioCtx.currentTime,0.2); }
function setDrumStyle(s) { perfDrumStyle=s; document.querySelectorAll('[data-ds]').forEach(b=>b.classList.toggle('on',b.dataset.ds===s)); }
function setBassStyle(s) { perfBassStyle=s; document.querySelectorAll('[data-bs]').forEach(b=>b.classList.toggle('on',b.dataset.bs===s)); }

// Tap tempo
let tapTimes = [];
function tapTempo() {
  const now = performance.now();
  tapTimes.push(now);
  tapTimes = tapTimes.filter(t => now - t < 3000);
  if (tapTimes.length >= 3) {
    let sum = 0;
    for (let i = 1; i < tapTimes.length; i++) sum += tapTimes[i] - tapTimes[i-1];
    const avg = sum / (tapTimes.length - 1);
    const bpm = Math.round(60000 / avg);
    if (bpm >= 50 && bpm <= 180) {
      perfBPM = bpm;
      document.getElementById('sl-bpm').value = bpm;
      document.getElementById('bpm-val').textContent = bpm;
    }
  }
}

// Expose to window
['setBPM','setScale','setKey','setMaster','toggleDrums','toggleBass','toggleDrone',
 'setSwing','setDrumVol','setBassVol','setBassTone','setDroneLvl','setReverb',
 'setDrumStyle','setBassStyle','tapTempo'].forEach(fn => window[fn] = eval(fn));

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);composer.setSize(window.innerWidth,window.innerHeight);
});

// ═════════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═════════════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  lerpState();
  drumImpact *= 0.87; if(drumImpact<0.01)drumImpact=0;

  // Sun
  sunMat.uniforms.uTime.value=t;sunMat.uniforms.uW.value=S.oscillator.w;sunMat.uniforms.uImpact.value=drumImpact;
  sun.scale.setScalar(1+Math.sin(t*0.5)*0.05+drumImpact*0.3);
  sunGlow.scale.setScalar(28+drumImpact*15+Math.sin(t*0.8)*3);
  sunLight.color.setHSL(S.oscillator.w*0.15+0.08,0.9,0.6);
  sunLight.intensity=2.5+drumImpact*3;

  // Planets
  const tk=ST.tokens||[];
  for(let i=0;i<planets.length;i++){const p=planets[i],to=tk[i]||{delta:0,volume:0};
  p.angle+=(p.cfg.spd*0.008)*(1+Math.abs(to.delta)*200);
  p.group.position.set(Math.cos(p.angle)*p.cfg.o, Math.sin(p.angle*2+i)*1.5, Math.sin(p.angle)*p.cfg.o*0.92);
  p.planet.scale.setScalar(1+(to.volume||0)*0.08+drumImpact*0.15);
  const pH=(p.cfg.h+S.oscillator.w*0.3)%1;
  p.planet.material.emissive.setHSL(pH,0.8,0.12+drumImpact*0.15);
  p.planet.material.color.setHSL(pH,0.7,0.35+drumImpact*0.1);
  p.planet.rotation.y+=0.005+i*0.001;}

  // Dust
  dMat.uniforms.uTime.value=t;dMat.uniforms.uW.value=S.oscillator.w;dMat.uniforms.uImpact.value=drumImpact;

  // Dragons
  updateDragons(t);

  // Bloom
  bloomPass.strength=1.2+Math.sin(t*S.tempo*Math.PI*2)*0.4+drumImpact*2.5;
  scene.background.setRGB(0.008+drumImpact*0.02, 0.005+S.oscillator.w*0.008, 0.02+drumImpact*0.01);

  // Camera
  const cR=70+Math.sin(t*0.04)*15,cY=25+Math.sin(t*0.06)*12,sh=drumImpact*1.0;
  camera.position.set(Math.cos(t*0.03)*cR+Math.sin(t*30)*sh, cY+Math.cos(t*25)*sh, Math.sin(t*0.03)*cR);
  camera.lookAt(0,0,0);

  updateGlyphs(t);
  if(audioStarted&&droneGN){const bF=midiToFreq(perfKey+36)+S.oscillator.w*10;
  droneO1.frequency.setTargetAtTime(bF,audioCtx.currentTime,0.5);droneO2.frequency.setTargetAtTime(bF*1.5,audioCtx.currentTime,0.5);}
  composer.render();
}
animate();
</script>
